<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkipStream</title>
  <style>
    :root {
      --bg: #eef0f5;
      --glass: rgba(255,255,255,0.45);
      --border: rgba(255,255,255,0.6);
      --surface: rgba(0,0,0,0.04);
      --text: #0f1117;
      --muted: #586070;
      --accent: #2563eb;
      --ok: #16a34a;
      --warn: #b45309;
      --off: rgba(0,0,0,0.14);
      --divider: rgba(0,0,0,0.07);
      --shadow: 0 8px 32px rgba(0,0,0,0.10),0 1.5px 6px rgba(0,0,0,0.06);
    }
    @media (prefers-color-scheme:dark) {
      :root {
        --bg:#0c0d12; --glass:rgba(22,24,32,0.72); --border:rgba(255,255,255,0.10);
        --surface:rgba(255,255,255,0.05); --text:#eef0f5; --muted:#7a8494;
        --ok:#4ade80; --warn:#fbbf24; --off:rgba(255,255,255,0.13);
        --divider:rgba(255,255,255,0.07); --shadow:0 8px 32px rgba(0,0,0,0.55);
      }
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{background:var(--bg)}
    body{
      width:280px; font-family:system-ui,-apple-system,sans-serif;
      background:var(--bg); color:var(--text); padding:10px;
    }
    @media(max-width:300px){body{width:100%;padding:8px}}

    .glass{
      background:var(--glass);
      backdrop-filter:blur(18px) saturate(160%);
      -webkit-backdrop-filter:blur(18px) saturate(160%);
      border:1px solid var(--border); border-radius:16px;
      box-shadow:var(--shadow); padding:12px 14px 8px; margin-bottom:8px;
    }

    /* Header */
    header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .logo{width:24px;height:24px;border-radius:7px;overflow:hidden;flex-shrink:0}
    .logo img{width:100%;height:100%}
    header h1{font-size:15px;font-weight:800;letter-spacing:-.02em;flex:1}
    .badge{font-size:9px;font-weight:700;background:var(--accent);color:#fff;border-radius:4px;padding:2px 5px}
    .settings-btn{
      background:none;border:none;cursor:pointer;color:var(--muted);
      font-size:16px;padding:2px 4px;border-radius:6px;transition:color .15s;
    }
    .settings-btn:hover{color:var(--accent)}

    /* Status */
    #status{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5}
    #status.ok{color:var(--ok)} #status.warn{color:var(--warn)}
    .alert-warn{
      font-size:11px;color:var(--warn);background:rgba(180,83,9,.09);
      border:1px solid rgba(180,83,9,.22);border-radius:8px;
      padding:7px 9px;margin-bottom:8px;line-height:1.5;display:none;
    }

    /* Section label */
    .section-label{
      font-size:10px;font-weight:700;letter-spacing:.08em;
      color:var(--muted);text-transform:uppercase;
      padding:0 2px 4px; margin-top:4px;
    }

    /* Rows */
    .row{
      display:flex;justify-content:space-between;align-items:center;
      padding:8px 2px;border-bottom:1px solid var(--divider);
      font-size:13px;gap:10px;
    }
    .row:last-child{border-bottom:none}
    .row-label{display:flex;flex-direction:column;gap:1px}
    .row-label span{color:var(--text);line-height:1.3}
    .row-label small{font-size:10px;color:var(--muted)}

    /* Toggle */
    .toggle{position:relative;width:38px;height:22px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .slider{position:absolute;inset:0;background:var(--off);border-radius:22px;transition:background .2s;cursor:pointer}
    .slider::before{
      content:'';position:absolute;width:16px;height:16px;
      left:3px;bottom:3px;background:#fff;border-radius:50%;
      transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.22);
    }
    input:checked+.slider{background:var(--accent)}
    input:checked+.slider::before{transform:translateX(16px)}

    footer{text-align:center;font-size:10px;color:var(--muted);padding:4px 0 2px;opacity:.6}
  </style>
</head>
<body>
  <div class="glass">
    <header>
      <div class="logo"><img src="icons/icon-48.png" alt="SkipStream"></div>
      <h1>SkipStream</h1>
      <span class="badge">v1.2</span>
      <button class="settings-btn" id="optionsBtn" title="Settings">⚙</button>
    </header>

    <div id="noConfig" class="alert-warn"></div>
    <div id="status">Checking…</div>

    <div class="section-label">Skip Segments</div>
    <div class="row">
      <div class="row-label"><span>Skip Intros</span></div>
      <label class="toggle"><input type="checkbox" id="skipIntro"><span class="slider"></span></label>
    </div>
    <div class="row">
      <div class="row-label"><span>Skip Recaps</span></div>
      <label class="toggle"><input type="checkbox" id="skipRecap"><span class="slider"></span></label>
    </div>
    <div class="row">
      <div class="row-label"><span>Skip Outros</span></div>
      <label class="toggle"><input type="checkbox" id="skipOutro"><span class="slider"></span></label>
    </div>
    <div class="row">
      <div class="row-label">
        <span>Add Missing Segments</span>
        <small>Report undetected intros to IntroDB</small>
      </div>
      <label class="toggle"><input type="checkbox" id="addSegment"><span class="slider"></span></label>
    </div>

    <div class="section-label" style="margin-top:6px">Playback</div>
    <div class="row">
      <div class="row-label"><span>Resume Playback</span></div>
      <label class="toggle"><input type="checkbox" id="resumePlayback"><span class="slider"></span></label>
    </div>
  </div>

  <footer>SkipStream · <a href="https://github.com/govinda-rajulu/openskip" target="_blank" style="color:inherit;text-decoration:none">GitHub</a></footer>
  <script src="popup.js"></script>
</body>
</html>
