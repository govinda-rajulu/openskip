<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkipStream</title>
  <style>
    :root {
      --bg:#eef0f5; --glass:rgba(255,255,255,0.45); --border:rgba(255,255,255,0.6);
      --surface:rgba(0,0,0,0.04); --text:#0f1117; --muted:#586070;
      --accent:#2563eb; --ok:#16a34a; --warn:#b45309;
      --off:rgba(0,0,0,0.14); --divider:rgba(0,0,0,0.07);
      --shadow:0 8px 32px rgba(0,0,0,0.10),0 1.5px 6px rgba(0,0,0,0.06);
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#0c0d12; --glass:rgba(22,24,32,0.72); --border:rgba(255,255,255,0.10);
        --surface:rgba(255,255,255,0.05); --text:#eef0f5; --muted:#7a8494;
        --ok:#4ade80; --warn:#fbbf24; --off:rgba(255,255,255,0.13);
        --divider:rgba(255,255,255,0.07); --shadow:0 8px 32px rgba(0,0,0,0.55);
      }
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{background:var(--bg)}
    body{
      width:300px;font-family:system-ui,-apple-system,sans-serif;
      background:var(--bg);color:var(--text);padding:10px;
    }
    @media(max-width:300px){body{width:100%;padding:8px}}

    .glass{
      background:var(--glass);
      backdrop-filter:blur(18px) saturate(160%);
      -webkit-backdrop-filter:blur(18px) saturate(160%);
      border:1px solid var(--border);border-radius:16px;
      box-shadow:var(--shadow);padding:12px 14px 10px;
    }

    /* Header */
    header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .logo{width:24px;height:24px;border-radius:7px;overflow:hidden;flex-shrink:0}
    .logo img{width:100%;height:100%}
    header h1{font-size:15px;font-weight:800;letter-spacing:-.02em;flex:1}
    .badge{font-size:9px;font-weight:700;background:var(--accent);color:#fff;border-radius:4px;padding:2px 5px;flex-shrink:0}
    .hdr-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:3px 5px;border-radius:6px;transition:color .15s;font-family:inherit}
    .hdr-btn:hover{color:var(--accent)}

    /* Tabs */
    .tabs{display:flex;gap:2px;margin-bottom:10px;border-bottom:1px solid var(--divider);padding-bottom:0}
    .tab{
      background:none;border:none;cursor:pointer;font-family:inherit;
      padding:6px 10px;font-size:11px;font-weight:600;color:var(--muted);
      border-bottom:2px solid transparent;transition:color .15s;
    }
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* Panels */
    .panel{display:none}
    .panel.active{display:block}

    /* Status */
    #status{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5}
    #status.ok{color:var(--ok)} #status.warn{color:var(--warn)}
    .alert-warn{
      font-size:11px;color:var(--warn);background:rgba(180,83,9,.09);
      border:1px solid rgba(180,83,9,.22);border-radius:8px;
      padding:7px 9px;margin-bottom:8px;line-height:1.5;display:none;
    }

    /* Section label */
    .slabel{
      font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);
      text-transform:uppercase;padding:0 2px 4px;margin-top:6px;display:block;
    }

    /* Toggle rows */
    .row{
      display:flex;justify-content:space-between;align-items:center;
      padding:8px 2px;border-bottom:1px solid var(--divider);font-size:13px;gap:10px;
    }
    .row:last-child{border-bottom:none}
    .rlabel{display:flex;flex-direction:column;gap:1px}
    .rlabel span{color:var(--text);line-height:1.3}
    .rlabel small{font-size:10px;color:var(--muted)}
    .toggle{position:relative;width:38px;height:22px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .slider{position:absolute;inset:0;background:var(--off);border-radius:22px;transition:background .2s;cursor:pointer}
    .slider::before{
      content:'';position:absolute;width:16px;height:16px;
      left:3px;bottom:3px;background:#fff;border-radius:50%;
      transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.22);
    }
    input:checked+.slider{background:var(--accent)}
    input:checked+.slider::before{transform:translateX(16px)}

    /* Master toggle row */
    .row-master{
      display:flex;justify-content:space-between;align-items:center;
      padding:8px 2px 6px;border-bottom:1px solid var(--divider);font-size:13px;gap:10px;
    }
    .master-left{display:flex;align-items:center;gap:6px;flex:1}
    .master-left span{color:var(--text);font-weight:600}
    .skip-badge{
      font-size:9px;font-weight:700;background:rgba(37,99,235,0.15);color:var(--accent);
      border-radius:4px;padding:2px 5px;transition:opacity .2s;
    }
    .skip-badge.hidden{opacity:0}

    /* Child toggle rows (indented) */
    .child-rows{overflow:hidden;transition:max-height .25s ease,opacity .25s ease;max-height:200px;opacity:1}
    .child-rows.collapsed{max-height:0;opacity:0;pointer-events:none}
    .row-child{
      display:flex;justify-content:space-between;align-items:center;
      padding:7px 2px 7px 14px;border-bottom:1px solid var(--divider);font-size:12px;gap:10px;
    }
    .row-child:last-child{border-bottom:none}
    .row-child .rlabel span{color:var(--muted)}

    /* Report Segment button */
    .report-wrap{padding:8px 2px 4px;border-bottom:1px solid var(--divider)}
    .report-btn{
      width:100%;padding:8px 12px;background:var(--surface);border:1px solid var(--divider);
      border-radius:8px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;
      font-family:inherit;text-align:left;transition:border-color .15s,color .15s;
    }
    .report-btn:hover{border-color:var(--accent);color:var(--accent)}
    .report-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(37,99,235,0.07)}

    /* Report flow */
    .report-flow{
      display:none;margin-top:7px;padding:9px 10px;
      background:var(--surface);border:1px solid var(--divider);
      border-radius:8px;font-size:11px;
    }
    .report-flow.visible{display:block}
    .report-flow .rf-label{color:var(--muted);margin-bottom:6px;line-height:1.5}
    .rf-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
    .rf-btn{
      padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;
      background:var(--surface);border:1px solid var(--divider);
      color:var(--text);cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s;
    }
    .rf-btn:hover{border-color:var(--accent);color:var(--accent)}
    .rf-btn.selected{background:rgba(37,99,235,0.12);border-color:var(--accent);color:var(--accent)}
    .rf-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .rf-btn.primary:hover{background:#1d4ed8}
    .rf-btn.danger{background:rgba(220,38,38,0.08);border-color:rgba(220,38,38,0.3);color:#dc2626}
    .rf-time{font-size:10px;color:var(--ok);font-weight:600;margin-left:2px}

    /* History panel */
    .search{
      width:100%;padding:7px 10px;background:var(--surface);
      border:1px solid var(--divider);border-radius:8px;
      font-size:12px;color:var(--text);font-family:inherit;
      outline:none;margin-bottom:8px;
    }
    .search:focus{border-color:var(--accent)}
    #history-list{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
    .h-item{
      background:var(--surface);border:1px solid var(--divider);border-radius:8px;
      padding:8px 10px;cursor:pointer;text-decoration:none;color:inherit;display:block;
      transition:border-color .15s;
    }
    .h-item:hover{border-color:var(--accent)}
    .h-title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
    .h-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px}
    .h-bar{width:100%;height:3px;background:var(--divider);border-radius:2px;overflow:hidden}
    .h-fill{height:100%;background:var(--accent);border-radius:2px}
    .h-empty{font-size:12px;color:var(--muted);text-align:center;padding:24px 0}

    footer{text-align:center;font-size:10px;color:var(--muted);padding:6px 0 2px;opacity:.6}
    footer a{color:inherit;text-decoration:none}
  </style>
</head>
<body>
  <div class="glass">
    <header>
      <div class="logo"><img src="icons/icon-48.png" alt="SkipStream"></div>
      <h1>SkipStream</h1>
      <span class="badge" id="versionBadge">v1.5</span>
      <button class="hdr-btn" id="optionsBtn" title="Settings">⚙</button>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="settings">⚙ Settings</button>
      <button class="tab" data-tab="history">📺 History</button>
    </div>

    <!-- Settings panel -->
    <div id="settings" class="panel active">
      <div id="noConfig" class="alert-warn"></div>
      <div id="status">Checking…</div>

      <!-- Master Skip Segments toggle -->
      <span class="slabel">Skip Segments</span>
      <div class="row-master">
        <div class="master-left">
          <span>Skip Segments</span>
          <span class="skip-badge hidden" id="skipBadge">0/3</span>
        </div>
        <label class="toggle"><input type="checkbox" id="skipMaster"><span class="slider"></span></label>
      </div>
      <!-- Child toggles -->
      <div class="child-rows collapsed" id="childRows">
        <div class="row-child">
          <div class="rlabel"><span>Intros</span></div>
          <label class="toggle"><input type="checkbox" id="skipIntro"><span class="slider"></span></label>
        </div>
        <div class="row-child">
          <div class="rlabel"><span>Recaps</span></div>
          <label class="toggle"><input type="checkbox" id="skipRecap"><span class="slider"></span></label>
        </div>
        <div class="row-child">
          <div class="rlabel"><span>Outros</span></div>
          <label class="toggle"><input type="checkbox" id="skipOutro"><span class="slider"></span></label>
        </div>
      </div>

      <!-- Report Segment tool -->
      <div class="report-wrap">
        <button class="report-btn" id="reportToggleBtn">📌 Report Segment</button>
        <div class="report-flow" id="reportFlow">
          <div class="rf-label" id="rfLabel">Press Start when the segment begins playing.</div>
          <div class="rf-row" id="rfActionRow">
            <button class="rf-btn primary" id="rfStartBtn">▶ Start</button>
            <button class="rf-btn danger" id="rfCancelBtn">✕ Cancel</button>
          </div>
          <div class="rf-row" id="rfTypeRow" style="display:none">
            <button class="rf-btn" data-type="intro">Intro</button>
            <button class="rf-btn" data-type="recap">Recap</button>
            <button class="rf-btn" data-type="outro">Outro</button>
          </div>
          <div id="rfSubmitRow" style="display:none">
            <button class="rf-btn primary" id="rfSubmitBtn">Submit</button>
          </div>
        </div>
      </div>

      <span class="slabel" style="margin-top:8px">Playback</span>
      <div class="row">
        <div class="rlabel"><span>Resume Playback</span></div>
        <label class="toggle"><input type="checkbox" id="resumePlayback"><span class="slider"></span></label>
      </div>
    </div>

    <!-- History panel -->
    <div id="history" class="panel">
      <input type="search" id="historySearch" class="search" placeholder="Filter by title…">
      <select id="historyFilter" class="search" style="margin-bottom:8px;cursor:pointer">
        <option value="">All sites</option>
      </select>
      <div id="history-list"><div class="h-empty">Loading…</div></div>
    </div>
  </div>

  <footer><a href="https://github.com/govinda-rajulu/openskip" target="_blank">SkipStream</a></footer>
  <script src="popup.js"></script>
</body>
</html>
