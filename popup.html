<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkipStream</title>
  <style>
    :root {
      --bg:#eef0f5; --glass:rgba(255,255,255,0.45); --border:rgba(255,255,255,0.6);
      --surface:rgba(0,0,0,0.04); --text:#0f1117; --muted:#586070;
      --accent:#2563eb; --ok:#16a34a; --warn:#b45309;
      --off:rgba(0,0,0,0.14); --divider:rgba(0,0,0,0.07);
      --shadow:0 8px 32px rgba(0,0,0,0.10),0 1.5px 6px rgba(0,0,0,0.06);
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#0c0d12; --glass:rgba(22,24,32,0.72); --border:rgba(255,255,255,0.10);
        --surface:rgba(255,255,255,0.05); --text:#eef0f5; --muted:#7a8494;
        --ok:#4ade80; --warn:#fbbf24; --off:rgba(255,255,255,0.13);
        --divider:rgba(255,255,255,0.07); --shadow:0 8px 32px rgba(0,0,0,0.55);
      }
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{background:var(--bg)}
    body{
      width:300px;font-family:system-ui,-apple-system,sans-serif;
      background:var(--bg);color:var(--text);padding:10px;
    }
    @media(max-width:300px){body{width:100%;padding:8px}}

    .glass{
      background:var(--glass);
      backdrop-filter:blur(18px) saturate(160%);
      -webkit-backdrop-filter:blur(18px) saturate(160%);
      border:1px solid var(--border);border-radius:16px;
      box-shadow:var(--shadow);padding:12px 14px 10px;
    }

    /* Header */
    header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .logo{width:24px;height:24px;border-radius:7px;overflow:hidden;flex-shrink:0}
    .logo img{width:100%;height:100%}
    header h1{font-size:15px;font-weight:800;letter-spacing:-.02em;flex:1}
    .badge{font-size:9px;font-weight:700;background:var(--accent);color:#fff;border-radius:4px;padding:2px 5px;flex-shrink:0}
    .hdr-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:3px 5px;border-radius:6px;transition:color .15s;font-family:inherit}
    .hdr-btn:hover{color:var(--accent)}

    /* Tabs */
    .tabs{display:flex;gap:2px;margin-bottom:10px;border-bottom:1px solid var(--divider);padding-bottom:0}
    .tab{
      background:none;border:none;cursor:pointer;font-family:inherit;
      padding:6px 10px;font-size:11px;font-weight:600;color:var(--muted);
      border-bottom:2px solid transparent;transition:color .15s;
    }
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* Panels */
    .panel{display:none}
    .panel.active{display:block}

    /* Status */
    #status{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5}
    #status.ok{color:var(--ok)} #status.warn{color:var(--warn)}
    .alert-warn{
      font-size:11px;color:var(--warn);background:rgba(180,83,9,.09);
      border:1px solid rgba(180,83,9,.22);border-radius:8px;
      padding:7px 9px;margin-bottom:8px;line-height:1.5;display:none;
    }

    /* Section label */
    .slabel{
      font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);
      text-transform:uppercase;padding:0 2px 4px;margin-top:6px;display:block;
    }

    /* Toggle rows */
    .row{
      display:flex;justify-content:space-between;align-items:center;
      padding:8px 2px;border-bottom:1px solid var(--divider);font-size:13px;gap:10px;
    }
    .row:last-child{border-bottom:none}
    .rlabel{display:flex;flex-direction:column;gap:1px}
    .rlabel span{color:var(--text);line-height:1.3}
    .rlabel small{font-size:10px;color:var(--muted)}
    .toggle{position:relative;width:38px;height:22px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .slider{position:absolute;inset:0;background:var(--off);border-radius:22px;transition:background .2s;cursor:pointer}
    .slider::before{
      content:'';position:absolute;width:16px;height:16px;
      left:3px;bottom:3px;background:#fff;border-radius:50%;
      transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.22);
    }
    input:checked+.slider{background:var(--accent)}
    input:checked+.slider::before{transform:translateX(16px)}

    /* History panel */
    .search{
      width:100%;padding:7px 10px;background:var(--surface);
      border:1px solid var(--divider);border-radius:8px;
      font-size:12px;color:var(--text);font-family:inherit;
      outline:none;margin-bottom:8px;
    }
    .search:focus{border-color:var(--accent)}
    #history-list{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
    .h-item{
      background:var(--surface);border:1px solid var(--divider);border-radius:8px;
      padding:8px 10px;cursor:pointer;text-decoration:none;color:inherit;display:block;
      transition:border-color .15s;
    }
    .h-item:hover{border-color:var(--accent)}
    .h-title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
    .h-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px}
    .h-bar{width:100%;height:3px;background:var(--divider);border-radius:2px;overflow:hidden}
    .h-fill{height:100%;background:var(--accent);border-radius:2px}
    .h-empty{font-size:12px;color:var(--muted);text-align:center;padding:24px 0}

    footer{text-align:center;font-size:10px;color:var(--muted);padding:6px 0 2px;opacity:.6}
    footer a{color:inherit;text-decoration:none}
  </style>
</head>
<body>
  <div class="glass">
    <header>
      <div class="logo"><img src="icons/icon-48.png" alt="SkipStream"></div>
      <h1>SkipStream</h1>
      <span class="badge">v1.3</span>
      <button class="hdr-btn" id="optionsBtn" title="Settings">⚙</button>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="settings">⚙ Settings</button>
      <button class="tab" data-tab="history">📺 History</button>
    </div>

    <!-- Settings panel -->
    <div id="settings" class="panel active">
      <div id="noConfig" class="alert-warn"></div>
      <div id="status">Checking…</div>

      <span class="slabel">Skip Segments</span>
      <div class="row">
        <div class="rlabel"><span>Skip Intros</span></div>
        <label class="toggle"><input type="checkbox" id="skipIntro"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="rlabel"><span>Skip Recaps</span></div>
        <label class="toggle"><input type="checkbox" id="skipRecap"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="rlabel"><span>Skip Outros</span></div>
        <label class="toggle"><input type="checkbox" id="skipOutro"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="rlabel">
          <span>Report Missing Segments</span>
          <small>Submit undetected intros to IntroDB</small>
        </div>
        <label class="toggle"><input type="checkbox" id="addSegment"><span class="slider"></span></label>
      </div>

      <span class="slabel" style="margin-top:8px">Playback</span>
      <div class="row">
        <div class="rlabel"><span>Resume Playback</span></div>
        <label class="toggle"><input type="checkbox" id="resumePlayback"><span class="slider"></span></label>
      </div>
    </div>

    <!-- History panel -->
    <div id="history" class="panel">
      <input type="search" id="historySearch" class="search" placeholder="Search title or site…">
      <div id="history-list"><div class="h-empty">Loading…</div></div>
    </div>
  </div>

  <footer><a href="https://github.com/govinda-rajulu/openskip" target="_blank">SkipStream</a></footer>
  <script src="popup.js"></script>
</body>
</html>
