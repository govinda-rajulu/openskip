<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkipStream</title>
<style>
/* ── Design tokens ─────────────────────────────────────────────── */
:root {
  --bg:           #f0f2f7;
  --card:         rgba(255,255,255,0.72);
  --card-border:  rgba(255,255,255,0.88);
  --surface:      rgba(0,0,0,0.038);
  --surface2:     rgba(0,0,0,0.06);
  --divider:      rgba(0,0,0,0.07);
  --text:         #0d0f14;
  --text2:        #50596a;
  --text3:        #8a95a8;
  --accent:       #2860f0;
  --accent-dim:   rgba(40,96,240,0.12);
  --accent-h:     #1a4fd8;
  --ok:           #15a350;
  --ok-dim:       rgba(21,163,80,0.11);
  --warn:         #c0720a;
  --warn-dim:     rgba(192,114,10,0.10);
  --danger:       #d93025;
  --danger-dim:   rgba(217,48,37,0.09);
  --toggle-off:   rgba(0,0,0,0.15);
  --shadow:       0 14px 48px rgba(0,0,0,0.11), 0 2px 8px rgba(0,0,0,0.06);
  --shadow-sm:    0 1px 4px rgba(0,0,0,0.08);
  --r-card:       18px;
  --r-md:         10px;
  --r-sm:         7px;
  --font:         'Inter', system-ui, -apple-system, sans-serif;
  --ease:         0.18s cubic-bezier(0.4,0,0.2,1);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:          #0b0d12;
    --card:        rgba(18,21,30,0.82);
    --card-border: rgba(255,255,255,0.08);
    --surface:     rgba(255,255,255,0.05);
    --surface2:    rgba(255,255,255,0.08);
    --divider:     rgba(255,255,255,0.07);
    --text:        #edf0f7;
    --text2:       #7e8da4;
    --text3:       #4e5a6e;
    --ok:          #34d474;
    --ok-dim:      rgba(52,212,116,0.11);
    --warn:        #f5a623;
    --warn-dim:    rgba(245,166,35,0.10);
    --danger:      #f25a4f;
    --danger-dim:  rgba(242,90,79,0.10);
    --toggle-off:  rgba(255,255,255,0.15);
    --shadow:      0 14px 48px rgba(0,0,0,0.55);
  }
}

/* ── Reset ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }

body {
  width: 320px;
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.45;
  color: var(--text);
  background: var(--bg);
  padding: 10px;
  user-select: none;
}

/* ── Card ──────────────────────────────────────────────────────── */
.card {
  background: var(--card);
  backdrop-filter: blur(28px) saturate(190%);
  -webkit-backdrop-filter: blur(28px) saturate(190%);
  border: 1px solid var(--card-border);
  border-radius: var(--r-card);
  box-shadow: var(--shadow);
  overflow: hidden;
}

/* ── Header strip ──────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 14px 0;
}

.logo {
  width: 26px; height: 26px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.logo img { width: 100%; height: 100%; display: block; }

.header-title {
  font-size: 14px;
  font-weight: 800;
  letter-spacing: -0.03em;
  flex: 1;
}

.ver-badge {
  font-size: 9px; font-weight: 700;
  background: var(--accent); color: #fff;
  border-radius: 5px; padding: 2px 6px;
  letter-spacing: 0.03em; flex-shrink: 0;
}

.icon-btn {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: 8px;
  cursor: pointer;
  color: var(--text2);
  transition: background var(--ease), color var(--ease), border-color var(--ease);
  flex-shrink: 0;
}
.icon-btn:hover {
  background: var(--surface2);
  color: var(--accent);
  border-color: var(--accent);
}
.icon-btn svg { display: block; }

/* ── Domain pill ───────────────────────────────────────────────── */
.domain-strip {
  padding: 8px 14px 0;
}
.domain-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px 4px 7px;
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: 20px;
  font-size: 11px;
  color: var(--text2);
  font-weight: 500;
  max-width: 100%;
  overflow: hidden;
}
.domain-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
  transition: background var(--ease), box-shadow var(--ease);
}
.domain-dot.active {
  background: var(--ok);
  box-shadow: 0 0 0 3px var(--ok-dim);
}
.domain-dot.warn {
  background: var(--warn);
  box-shadow: 0 0 0 3px var(--warn-dim);
}
#domainLabel {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 230px;
}

/* ── Master toggle hero ────────────────────────────────────────── */
.master-block {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px 12px;
  border-bottom: 1px solid var(--divider);
}

.master-info { flex: 1; }
.master-label {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.master-sub {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}

/* Large toggle (iOS-style) */
.toggle-lg { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
.toggle-lg input { opacity: 0; width: 0; height: 0; position: absolute; }
.slider-lg {
  position: absolute; inset: 0;
  background: var(--toggle-off);
  border-radius: 28px;
  cursor: pointer;
  transition: background var(--ease);
}
.slider-lg::before {
  content: '';
  position: absolute;
  width: 22px; height: 22px;
  left: 3px; top: 3px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,0.26);
  transition: transform var(--ease);
}
.toggle-lg input:checked + .slider-lg { background: var(--accent); }
.toggle-lg input:checked + .slider-lg::before { transform: translateX(20px); }

/* ── Stats row ─────────────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--divider);
  border-bottom: 1px solid var(--divider);
}
.stat-cell {
  background: var(--card);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.stat-val {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
  line-height: 1;
}
.stat-lbl {
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
  letter-spacing: 0.01em;
}

/* ── Skip mode pill row ────────────────────────────────────────── */
.mode-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--divider);
}
.mode-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  flex: 1;
}
.mode-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 5px;
  background: var(--accent-dim);
  color: var(--accent);
  letter-spacing: 0.02em;
  flex-shrink: 0;
}
.mode-badge.off { background: var(--surface2); color: var(--text3); }

/* ── Segment child toggles ─────────────────────────────────────── */
.seg-toggles {
  padding: 0 0 4px;
}

.seg-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--divider);
  transition: background var(--ease);
}
.seg-row:last-child { border-bottom: none; }
.seg-row:hover { background: var(--surface); }

.seg-icon {
  width: 24px; height: 24px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
}
.seg-icon.intro { background: var(--accent-dim); }
.seg-icon.recap { background: var(--warn-dim); }
.seg-icon.outro { background: var(--ok-dim); }

.seg-text { flex: 1; }
.seg-name { font-size: 12px; font-weight: 600; }
.seg-desc { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* Small toggle */
.toggle-sm { position: relative; width: 34px; height: 19px; flex-shrink: 0; }
.toggle-sm input { opacity: 0; width: 0; height: 0; position: absolute; }
.slider-sm {
  position: absolute; inset: 0;
  background: var(--toggle-off);
  border-radius: 19px;
  cursor: pointer;
  transition: background var(--ease);
}
.slider-sm::before {
  content: '';
  position: absolute;
  width: 13px; height: 13px;
  left: 3px; top: 3px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,0.22);
  transition: transform var(--ease);
}
.toggle-sm input:checked + .slider-sm { background: var(--accent); }
.toggle-sm input:checked + .slider-sm::before { transform: translateX(15px); }

/* disabled state for child toggles */
.seg-row.disabled { opacity: 0.38; pointer-events: none; }

/* ── Bottom action bar ─────────────────────────────────────────── */
.action-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px 12px;
  border-top: 1px solid var(--divider);
}

.action-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 7px 10px;
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: var(--r-md);
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: background var(--ease), color var(--ease), border-color var(--ease);
}
.action-btn:hover {
  background: var(--surface2);
  color: var(--accent);
  border-color: var(--accent);
}
.action-btn svg { flex-shrink: 0; }

.action-btn.gear {
  flex: 0 0 auto;
  width: 34px;
  padding: 7px;
}

/* ── Footer ────────────────────────────────────────────────────── */
footer {
  text-align: center;
  font-size: 10px;
  color: var(--text3);
  padding: 6px 0 2px;
  opacity: 0.6;
}
footer a { color: inherit; text-decoration: none; }
footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="logo"><img src="icons/icon-48.png" alt="SkipStream"></div>
    <span class="header-title">SkipStream</span>
    <span class="ver-badge" id="versionBadge"></span>
  </div>

  <!-- Active domain pill -->
  <div class="domain-strip">
    <div class="domain-pill">
      <div class="domain-dot" id="domainDot"></div>
      <span id="domainLabel">No active video tab</span>
    </div>
  </div>

  <!-- Master toggle -->
  <div class="master-block">
    <div class="master-info">
      <div class="master-label">SkipStream</div>
      <div class="master-sub" id="masterSub">Loading…</div>
    </div>
    <label class="toggle-lg">
      <input type="checkbox" id="masterToggle">
      <span class="slider-lg"></span>
    </label>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-cell">
      <div class="stat-val" id="statSkips">0</div>
      <div class="stat-lbl">Skips today</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val" id="statTime">0m</div>
      <div class="stat-lbl">Time saved</div>
    </div>
  </div>

  <!-- Skip mode indicator -->
  <div class="mode-row">
    <span class="mode-label">Skip mode</span>
    <span class="mode-badge off" id="modeBadge">Disabled</span>
  </div>

  <!-- Segment child toggles -->
  <div class="seg-toggles">

    <div class="seg-row" id="rowIntro">
      <div class="seg-icon intro">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"><polygon points="1,1 11,6 1,11"/><line x1="11" y1="1" x2="11" y2="11"/></svg>
      </div>
      <div class="seg-text">
        <div class="seg-name">Skip Intros</div>
        <div class="seg-desc">Opening credits &amp; title sequences</div>
      </div>
      <label class="toggle-sm">
        <input type="checkbox" id="skipIntro">
        <span class="slider-sm"></span>
      </label>
    </div>

    <div class="seg-row" id="rowRecap">
      <div class="seg-icon recap">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="var(--warn)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 5,8 11,1"/><path d="M1 10h10"/></svg>
      </div>
      <div class="seg-text">
        <div class="seg-name">Skip Recaps</div>
        <div class="seg-desc">Previously on… summaries</div>
      </div>
      <label class="toggle-sm">
        <input type="checkbox" id="skipRecap">
        <span class="slider-sm"></span>
      </label>
    </div>

    <div class="seg-row" id="rowOutro">
      <div class="seg-icon outro">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="var(--ok)" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="1" y2="11"/><polygon points="3,1 11,6 3,11"/></svg>
      </div>
      <div class="seg-text">
        <div class="seg-name">Skip Outros</div>
        <div class="seg-desc">End credits &amp; post-roll</div>
      </div>
      <label class="toggle-sm">
        <input type="checkbox" id="skipOutro">
        <span class="slider-sm"></span>
      </label>
    </div>

  </div>

  <!-- Action bar -->
  <div class="action-bar">
    <button class="action-btn" id="historyBtn">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 1.5"/></svg>
      History
    </button>
    <button class="action-btn" id="statsBtn">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="9" width="3" height="6" rx="1"/><rect x="6.5" y="5" width="3" height="10" rx="1"/><rect x="12" y="1" width="3" height="14" rx="1"/></svg>
      Stats
    </button>
    <button class="action-btn gear" id="settingsBtn" title="Open Settings">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.4"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/></svg>
    </button>
  </div>

</div>

<footer><a href="https://github.com/govinda-rajulu/openskip" target="_blank">SkipStream</a></footer>

<script src="popup.js"></script>
</body>
</html>
