<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkipStream</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="card">

  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="3,2 13,8 3,14"/><line x1="13" y1="2" x2="13" y2="14"/>
      </svg>
    </div>
    <span class="header-title">SkipStream</span>
    <span class="ver-badge" id="versionBadge"></span>
    <button class="icon-btn theme-btn" id="themeBtn" title="Toggle theme">
      <svg class="icon-sun" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><line x1="8" y1="1" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="15"/><line x1="1" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="15" y2="8"/><line x1="3.05" y1="3.05" x2="4.46" y2="4.46"/><line x1="11.54" y1="11.54" x2="12.95" y2="12.95"/><line x1="12.95" y1="3.05" x2="11.54" y2="4.46"/><line x1="4.46" y1="11.54" x2="3.05" y2="12.95"/></svg>
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M13.5 10A6 6 0 0 1 6 2.5a6 6 0 1 0 7.5 7.5z"/></svg>
    </button>
  </div>

  <div class="tab-bar">
    <button class="tab active" data-tab="status">Status</button>
    <button class="tab" data-tab="skip">Skip Settings</button>
  </div>

  <!-- Status page -->
  <div class="page" id="page-status">
    <div class="domain-strip">
      <div class="domain-pill">
        <div id="domainDot"></div>
        <span id="domainLabel">No active video tab</span>
      </div>
    </div>

    <div class="master-block">
      <div class="master-info">
        <div class="master-label">SkipStream</div>
        <div class="master-sub" id="masterSub">Loading…</div>
      </div>
      <label class="toggle-lg">
        <input type="checkbox" id="masterToggle">
        <span class="slider-lg"></span>
      </label>
    </div>

    <div class="stats-row">
      <div class="stat-cell">
        <div class="stat-val" id="statSkips">0</div>
        <div class="stat-lbl">Skips today</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="statTime">0s</div>
        <div class="stat-lbl">Time saved</div>
      </div>
    </div>

    <div class="mode-row">
      <span class="mode-label">Skip mode</span>
      <span class="mode-badge off" id="modeBadge">Disabled</span>
    </div>

    <div class="seg-toggles">
      <div class="seg-row" id="rowIntro">
        <div class="seg-icon intro">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"><polygon points="1,1 11,6 1,11"/><line x1="11" y1="1" x2="11" y2="11"/></svg>
        </div>
        <div class="seg-text"><div class="seg-name">Skip Intros</div><div class="seg-desc">Opening credits</div></div>
        <label class="toggle-sm"><input type="checkbox" id="skipIntro"><span class="slider-sm"></span></label>
      </div>
      <div class="seg-row" id="rowRecap">
        <div class="seg-icon recap">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="var(--warn)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 5,8 11,1"/><path d="M1 10h10"/></svg>
        </div>
        <div class="seg-text"><div class="seg-name">Skip Recaps</div><div class="seg-desc">Previously on…</div></div>
        <label class="toggle-sm"><input type="checkbox" id="skipRecap"><span class="slider-sm"></span></label>
      </div>
      <div class="seg-row" id="rowOutro">
        <div class="seg-icon outro">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="var(--ok)" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="1" y2="11"/><polygon points="3,1 11,6 3,11"/></svg>
        </div>
        <div class="seg-text"><div class="seg-name">Skip Outros</div><div class="seg-desc">End credits</div></div>
        <label class="toggle-sm"><input type="checkbox" id="skipOutro"><span class="slider-sm"></span></label>
      </div>
    </div>

    <div class="action-bar">
      <button class="action-btn" id="historyBtn">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 1.5"/></svg>
        History
      </button>
      <button class="action-btn" id="statsBtn">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="9" width="3" height="6" rx="1"/><rect x="6.5" y="5" width="3" height="10" rx="1"/><rect x="12" y="1" width="3" height="14" rx="1"/></svg>
        Stats
      </button>
      <button class="action-btn gear" id="settingsBtn" title="Open full settings">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.4"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/></svg>
      </button>
    </div>
  </div>

  <!-- Skip Settings page -->
  <div class="page page-hidden" id="page-skip">
    <div class="skip-inner">

      <div class="skip-section">
        <div class="skip-label">Skip Mode</div>
        <div class="skip-mode-grid">
          <button class="smode-chip" data-mode="off"><span class="smc-name">Off</span><span class="smc-desc">Paused</span></button>
          <button class="smode-chip" data-mode="prompt"><span class="smc-name">Prompt</span><span class="smc-desc">Show button</span></button>
          <button class="smode-chip" data-mode="auto-all"><span class="smc-name">Auto All</span><span class="smc-desc">Everything</span></button>
          <button class="smode-chip" data-mode="auto-intro"><span class="smc-name">Intros</span><span class="smc-desc">Only intros</span></button>
          <button class="smode-chip" data-mode="auto-recap"><span class="smc-name">Recaps</span><span class="smc-desc">Only recaps</span></button>
          <button class="smode-chip" data-mode="auto-outro"><span class="smc-name">Outros</span><span class="smc-desc">Only outros</span></button>
        </div>
      </div>

      <div class="skip-section">
        <div class="skip-label">Segments &amp; Behavior</div>
        <div class="stog-list">
          <label class="stog-row"><span>Skip Intros</span><span class="stog-right"><input type="checkbox" id="p-skipIntro"><span class="stog-slider"></span></span></label>
          <label class="stog-row"><span>Skip Recaps</span><span class="stog-right"><input type="checkbox" id="p-skipRecap"><span class="stog-slider"></span></span></label>
          <label class="stog-row"><span>Skip Outros</span><span class="stog-right"><input type="checkbox" id="p-skipOutro"><span class="stog-slider"></span></span></label>
          <label class="stog-row"><span>Resume Playback</span><span class="stog-right"><input type="checkbox" id="p-resumePlayback"><span class="stog-slider"></span></span></label>
          <label class="stog-row"><span>Auto Next Episode</span><span class="stog-right"><input type="checkbox" id="p-autoNextEpisode"><span class="stog-slider"></span></span></label>
        </div>
      </div>

      <div class="skip-section">
        <div class="skip-label">Playback Speed</div>
        <div class="speed-row">
          <button class="speed-chip" data-rate="0.75">0.75×</button>
          <button class="speed-chip" data-rate="1">1×</button>
          <button class="speed-chip" data-rate="1.25">1.25×</button>
          <button class="speed-chip" data-rate="1.5">1.5×</button>
          <button class="speed-chip" data-rate="2">2×</button>
        </div>
      </div>

      <button class="save-btn" id="saveSkipBtn">Save Settings</button>
    </div>
  </div>

</div>

<footer><a href="https://github.com/govinda-rajulu/openskip" target="_blank">SkipStream</a></footer>
<script src="popup.js"></script>
</body>
</html>
