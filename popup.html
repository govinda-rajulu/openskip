<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkipStream</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="card">

  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="3,2 13,8 3,14"/><line x1="13" y1="2" x2="13" y2="14"/>
      </svg>
    </div>
    <span class="header-title">SkipStream</span>
    <span class="ver-badge" id="versionBadge"></span>
    <button class="icon-btn theme-btn" id="themeBtn" title="Toggle light/dark" aria-label="Toggle light/dark theme">
      <svg class="icon-sun" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><line x1="8" y1="1" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="15"/><line x1="1" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="15" y2="8"/><line x1="3.05" y1="3.05" x2="4.46" y2="4.46"/><line x1="11.54" y1="11.54" x2="12.95" y2="12.95"/><line x1="12.95" y1="3.05" x2="11.54" y2="4.46"/><line x1="4.46" y1="11.54" x2="3.05" y2="12.95"/></svg>
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M13.5 10A6 6 0 0 1 6 2.5a6 6 0 1 0 7.5 7.5z"/></svg>
    </button>
  </div>

  <div class="tab-bar" role="tablist">
    <button class="tab active" data-tab="status" role="tab" aria-selected="true">Status</button>
    <button class="tab" data-tab="settings" role="tab" aria-selected="false">Settings</button>
  </div>

  <!-- STATUS page -->
  <div class="page" id="page-status">

    <div class="domain-strip">
      <div class="domain-pill">
        <div id="domainDot"></div>
        <span id="domainLabel">Detecting tab...</span>
      </div>
    </div>

    <div class="master-block">
      <div class="master-info">
        <div class="master-label">SkipStream</div>
        <div class="master-sub" id="masterSub">Loading...</div>
      </div>
      <label class="toggle-lg">
        <input type="checkbox" id="masterToggle" aria-label="Enable SkipStream">
        <span class="slider-lg"></span>
      </label>
    </div>

    <div class="stats-row">
      <div class="stat-cell">
        <div class="stat-val" id="statSkips">0</div>
        <div class="stat-lbl">Skips today</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="statTime">0s</div>
        <div class="stat-lbl">Time saved</div>
      </div>
    </div>

    <div class="mode-row">
      <span class="mode-label">Active mode</span>
      <span class="mode-badge off" id="modeBadge">Loading</span>
    </div>

    <div class="action-bar">
      <button class="action-btn" id="historyBtn">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 1.5"/></svg>
        History
      </button>
      <button class="action-btn" id="statsBtn">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="9" width="3" height="6" rx="1"/><rect x="6.5" y="5" width="3" height="10" rx="1"/><rect x="12" y="1" width="3" height="14" rx="1"/></svg>
        Stats
      </button>
      <button class="action-btn gear" id="settingsBtn" title="Full settings" aria-label="Open full settings">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.4"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/></svg>
      </button>
    </div>
  </div>

  <!-- SETTINGS page -->
  <div class="page page-hidden" id="page-settings">
    <div class="skip-inner">

      <div class="skip-section">
        <div class="skip-label">Skip Mode</div>
        <div class="skip-mode-grid" role="radiogroup" aria-label="Skip Mode">
          <button class="smode-chip" data-mode="off" role="radio" aria-checked="false"><span class="smc-name">Off</span><span class="smc-desc">Disabled</span></button>
          <button class="smode-chip" data-mode="prompt" role="radio" aria-checked="false"><span class="smc-name">Prompt</span><span class="smc-desc">Show button</span></button>
          <button class="smode-chip" data-mode="auto-all" role="radio" aria-checked="false"><span class="smc-name">Auto All</span><span class="smc-desc">Everything</span></button>
          <button class="smode-chip" data-mode="auto-intro" role="radio" aria-checked="false"><span class="smc-name">Intros</span><span class="smc-desc">Only intros</span></button>
          <button class="smode-chip" data-mode="auto-recap" role="radio" aria-checked="false"><span class="smc-name">Recaps</span><span class="smc-desc">Only recaps</span></button>
          <button class="smode-chip" data-mode="auto-outro" role="radio" aria-checked="false"><span class="smc-name">Outros</span><span class="smc-desc">Only outros</span></button>
        </div>
      </div>

      <div class="skip-section">
        <div class="skip-label">Segments</div>
        <div class="stog-list">
          <label class="stog-row"><span>Skip Intros</span><span class="stog-right"><input type="checkbox" id="skipIntro"><span class="stog-slider"></span></span></label>
          <label class="stog-row"><span>Skip Recaps</span><span class="stog-right"><input type="checkbox" id="skipRecap"><span class="stog-slider"></span></span></label>
          <label class="stog-row"><span>Skip Outros</span><span class="stog-right"><input type="checkbox" id="skipOutro"><span class="stog-slider"></span></span></label>
          <label class="stog-row"><span>Resume Playback</span><span class="stog-right"><input type="checkbox" id="resumePlayback"><span class="stog-slider"></span></span></label>
          <label class="stog-row"><span>Auto Next Episode</span><span class="stog-right"><input type="checkbox" id="autoNextEpisode"><span class="stog-slider"></span></span></label>
        </div>
      </div>

      <div class="skip-section">
        <div class="skip-label">Playback Speed</div>
        <div class="speed-row" role="radiogroup" aria-label="Playback Speed">
          <button class="speed-chip" data-rate="0.75" role="radio" aria-checked="false">0.75x</button>
          <button class="speed-chip" data-rate="1" role="radio" aria-checked="false">1x</button>
          <button class="speed-chip" data-rate="1.25" role="radio" aria-checked="false">1.25x</button>
          <button class="speed-chip" data-rate="1.5" role="radio" aria-checked="false">1.5x</button>
          <button class="speed-chip" data-rate="2" role="radio" aria-checked="false">2x</button>
        </div>
      </div>

      <div class="skip-section">
        <div class="skip-label">Subtitles</div>
        <div class="sub-row">
          <button class="sub-upload-btn" id="subUploadBtn">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 2v8M5 5l3-3 3 3"/><path d="M2 12v2h12v-2"/></svg>
            Load .srt / .vtt
          </button>
          <button class="sub-clear-btn" id="subClearBtn" title="Clear loaded subtitle" aria-label="Clear loaded subtitle">x</button>
        </div>
        <span class="sub-status" id="subStatus">No subtitle loaded</span>
        <input type="file" id="subFileInput" accept=".srt,.vtt" style="display:none">
        <div class="sub-lang-row">
          <label class="skip-label" style="margin:0;flex-shrink:0">Language</label>
          <select id="subLangSelect" class="sub-lang-select">
            <option value="en">English</option>
            <option value="ta">Tamil</option>
            <option value="hi">Hindi</option>
            <option value="te">Telugu</option>
            <option value="ml">Malayalam</option>
            <option value="bn">Bengali</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="pt">Portuguese</option>
            <option value="it">Italian</option>
            <option value="ru">Russian</option>
            <option value="ar">Arabic</option>
            <option value="zh-CN">Chinese (S)</option>
            <option value="zh-TW">Chinese (T)</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="tr">Turkish</option>
            <option value="nl">Dutch</option>
            <option value="pl">Polish</option>
            <option value="sv">Swedish</option>
            <option value="uk">Ukrainian</option>
            <option value="vi">Vietnamese</option>
            <option value="id">Indonesian</option>
            <option value="fa">Persian</option>
            <option value="he">Hebrew</option>
            <option value="el">Greek</option>
          </select>
        </div>
      </div>

      <button class="save-btn" id="saveSettingsBtn">Save Settings</button>

    </div>
  </div>

</div>
<footer><a href="https://github.com/govinda-rajulu/openskip" target="_blank">SkipStream</a></footer>
<script src="popup.js"></script>
</body>
</html>
