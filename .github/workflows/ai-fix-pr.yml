name: AI Fix → Pull Request

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  # ── Triggered by 'ai-fix' label (owner only) ────────────────────────────────
  create-fix-pr:
    if: |
      github.event_name == 'issues' &&
      github.event.label.name == 'ai-fix' &&
      github.event.sender.login == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Build repo context
        run: |
          {
            echo "=== CLAUDE.md (architecture rules) ==="
            cat CLAUDE.md
            echo ""
            echo "=== manifest.json ==="
            cat manifest.json
            echo ""
            for f in background.js content-scripts/content.js options.js popup.js; do
              echo "=== $f ==="
              cat "$f"
              echo ""
            done
          } > /tmp/repo_context.txt
          echo "Context: $(wc -c < /tmp/repo_context.txt) bytes"

      - name: AI generate fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          ISSUE_NUMBER:      ${{ github.event.issue.number }}
          ISSUE_TITLE:       ${{ github.event.issue.title }}
          ISSUE_BODY:        ${{ github.event.issue.body }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error, time

          issue_num   = os.environ.get("ISSUE_NUMBER", "")
          issue_title = os.environ.get("ISSUE_TITLE", "")
          issue_body  = os.environ.get("ISSUE_BODY", "")
          anthropic_key = os.environ.get("ANTHROPIC_API_KEY", "")
          gemini_key    = os.environ.get("GEMINI_API_KEY", "")

          if not anthropic_key and not gemini_key:
              json.dump({"error": "NO_AI_KEY"}, open("/tmp/ai_fix.json", "w"))
              exit(0)

          repo_context = open("/tmp/repo_context.txt").read()

          prompt = f"""You are fixing a bug or implementing a feature for SkipStream — a Firefox/Chrome browser extension.

STRICT ARCHITECTURE RULES (CI enforces all — violations will fail):
1. NEVER use localStorage in content-scripts/content.js — only browser.storage.local via sendMessage
2. NEVER use fetch() in content-scripts/content.js — all network calls go through background.js
3. NEVER use innerHTML — use DOM API: createElement, textContent, replaceChildren
4. NEVER use console.log — only console.warn for diagnostics
5. userId = SHA-256("skipstream:uid:" + supabaseAnonKey) — never random, never stored as-is
6. SPA nav = intercept pushState/replaceState + popstate listener — no setInterval polling
7. Video detection: width ≥ 25% viewport, height ≥ 20% viewport, aspect ratio 1.2–3.0

ISSUE #{issue_num}: {issue_title}
{issue_body}

CURRENT CODEBASE:
{repo_context[:80000]}

Respond with ONLY a JSON array (no markdown, no explanation, no code fences):
[
  {{
    "filename": "path/to/file.js",
    "content": "COMPLETE file content — not a diff, not a snippet",
    "description": "what changed and why (max 72 chars)"
  }}
]

Rules:
- Only include files that actually change
- Write the COMPLETE file content for each changed file
- If this cannot be safely automated: [{{"filename":"","content":"","description":"CANNOT_FIX: reason"}}]
"""

          def call_claude(p):
              data = json.dumps({"model":"claude-sonnet-4-6","max_tokens":8192,"messages":[{"role":"user","content":p}]}).encode()
              req = urllib.request.Request("https://api.anthropic.com/v1/messages", data=data,
                  headers={"Content-Type":"application/json","x-api-key":anthropic_key,"anthropic-version":"2023-06-01"}, method="POST")
              with urllib.request.urlopen(req, timeout=120) as r:
                  return json.load(r)["content"][0]["text"].strip()

          def call_gemini(p):
              data = json.dumps({"contents":[{"parts":[{"text":p}]}],"generationConfig":{"temperature":0.1,"maxOutputTokens":8192}}).encode()
              url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={gemini_key}"
              for attempt in range(4):
                  try:
                      req = urllib.request.Request(url, data=data, headers={"Content-Type":"application/json"}, method="POST")
                      with urllib.request.urlopen(req, timeout=90) as r:
                          return json.load(r)["candidates"][0]["content"]["parts"][0]["text"].strip()
                  except urllib.error.HTTPError as e:
                      if e.code == 429: time.sleep(30 * (attempt+1))
                      else: raise
              raise RuntimeError("Gemini rate limit exceeded")

          try:
              text = call_claude(prompt) if anthropic_key else call_gemini(prompt)
              print(f"AI response: {len(text)} chars")
              if text.startswith("```"):
                  text = text.split("\n",1)[1].rsplit("```",1)[0].strip()
              json.loads(text)  # validate
              open("/tmp/ai_fix.json","w").write(text)
          except Exception as e:
              json.dump({"error": str(e)}, open("/tmp/ai_fix.json","w"))
          PYEOF

      - name: Apply fix and open PR
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
        with:
          script: |
            const fs       = require('fs');
            const issueNum = parseInt(process.env.ISSUE_NUMBER);
            const issueTitle = process.env.ISSUE_TITLE;

            const comment = async (body) => github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum, body
            });

            let fixes;
            try {
              const parsed = JSON.parse(fs.readFileSync('/tmp/ai_fix.json','utf8'));
              if (!Array.isArray(parsed)) { await comment(`## 🤖 AI Fix Failed\n\nError: \`${parsed.error || JSON.stringify(parsed)}\`\n\nManual fix needed.`); return; }
              fixes = parsed;
            } catch(e) { await comment(`## 🤖 AI Fix Failed\n\nCould not parse AI response.\n\nError: ${e.message}`); return; }

            if (!fixes[0]?.filename) {
              await comment(`## 🤖 AI Fix — Manual Review Required\n\n${fixes[0]?.description || 'AI could not safely automate this.'}\n\nThis needs human implementation.`);
              return;
            }

            const branch = `ai-fix/issue-${issueNum}`;
            const { data: ref } = await github.rest.git.getRef({ owner:context.repo.owner, repo:context.repo.repo, ref:'heads/main' });
            try {
              await github.rest.git.createRef({ owner:context.repo.owner, repo:context.repo.repo, ref:`refs/heads/${branch}`, sha:ref.object.sha });
            } catch(e) {
              await github.rest.git.updateRef({ owner:context.repo.owner, repo:context.repo.repo, ref:`heads/${branch}`, sha:ref.object.sha, force:true });
            }

            const fileList = [];
            for (const fix of fixes) {
              if (!fix.filename || !fix.content) continue;
              let sha;
              try { ({ data: { sha } } = await github.rest.repos.getContent({ owner:context.repo.owner, repo:context.repo.repo, path:fix.filename, ref:branch })); } catch(e) {}
              await github.rest.repos.createOrUpdateFileContents({
                owner:context.repo.owner, repo:context.repo.repo, path:fix.filename,
                message:`fix: ${fix.description.slice(0,72)} (closes #${issueNum})`,
                content:Buffer.from(fix.content).toString('base64'), branch, ...(sha?{sha}:{})
              });
              fileList.push(`- \`${fix.filename}\`: ${fix.description}`);
            }

            const prBody = [
              `Closes #${issueNum}`,``,`## Changes`,fileList.join('\n'),``,`---`,
              `⚠️ **Review carefully before merging.** CI runs automatically.`,``,
              `- [ ] No \`localStorage\` or \`fetch()\` in content script`,
              `- [ ] No \`innerHTML\` or \`console.log\``,
              `- [ ] Logic correct for the reported issue`,
              `- [ ] Tested manually in Firefox`,
            ].join('\n');

            const { data: existing } = await github.rest.pulls.list({ owner:context.repo.owner, repo:context.repo.repo, head:`${context.repo.owner}:${branch}`, state:'open' });
            let pr;
            if (existing.length > 0) {
              await github.rest.pulls.update({ owner:context.repo.owner, repo:context.repo.repo, pull_number:existing[0].number, body:prBody });
              pr = existing[0];
            } else {
              ({ data: pr } = await github.rest.pulls.create({ owner:context.repo.owner, repo:context.repo.repo, title:`🤖 AI fix: ${issueTitle}`, head:branch, base:'main', body:prBody }));
            }
            await comment(`## 🤖 AI Fix PR Ready\n\nPR #${pr.number}: ${pr.html_url}\n\nCI is running. Please review and test in Firefox before merging.`);

  # ── Triggered by comment: /ai-fix, /ai-review, /ai-explain ─────────────────
  handle-command:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.sender.login == github.repository_owner &&
      (
        startsWith(github.event.comment.body, '/ai-fix') ||
        startsWith(github.event.comment.body, '/ai-review') ||
        startsWith(github.event.comment.body, '/ai-explain') ||
        startsWith(github.event.comment.body, '/ai-task')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Parse command
        id: cmd
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          CMD=$(echo "$COMMENT" | head -1 | awk '{print $1}')
          ARGS=$(echo "$COMMENT" | head -1 | cut -d' ' -f2-)
          echo "command=$CMD" >> $GITHUB_OUTPUT
          echo "args=$ARGS"   >> $GITHUB_OUTPUT
          echo "Command: $CMD | Args: $ARGS"

      - name: Build repo context
        run: |
          {
            echo "=== CLAUDE.md ==="
            cat CLAUDE.md
            echo ""
            echo "=== manifest.json ==="
            cat manifest.json
            echo ""
            for f in background.js content-scripts/content.js options.js popup.js; do
              echo "=== $f ==="
              cat "$f"
              echo ""
            done
          } > /tmp/repo_context.txt

      - name: Run AI command
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          CMD:                ${{ steps.cmd.outputs.command }}
          ARGS:               ${{ steps.cmd.outputs.args }}
          ISSUE_NUMBER:       ${{ github.event.issue.number }}
          ISSUE_TITLE:        ${{ github.event.issue.title }}
          ISSUE_BODY:         ${{ github.event.issue.body }}
          COMMENT_BODY:       ${{ github.event.comment.body }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error, time

          cmd           = os.environ.get("CMD","")
          args          = os.environ.get("ARGS","").strip()
          issue_num     = os.environ.get("ISSUE_NUMBER","")
          issue_title   = os.environ.get("ISSUE_TITLE","")
          issue_body    = os.environ.get("ISSUE_BODY","")
          comment_body  = os.environ.get("COMMENT_BODY","")
          anthropic_key = os.environ.get("ANTHROPIC_API_KEY","")
          gemini_key    = os.environ.get("GEMINI_API_KEY","")
          repo_context  = open("/tmp/repo_context.txt").read()

          if not anthropic_key and not gemini_key:
              open("/tmp/ai_cmd_result.json","w").write(json.dumps({"type":"error","text":"No AI key configured."}))
              exit(0)

          # Build command-specific prompt
          if cmd == "/ai-fix":
              task = args or f"{issue_title}\n{issue_body}"
              prompt = f"""Fix this for SkipStream browser extension:
{task}

Context from issue #{issue_num}: {issue_title}

STRICT RULES: no localStorage/fetch in content script, no innerHTML, no console.log.

CODEBASE:
{repo_context[:70000]}

Respond ONLY with JSON array (no markdown):
[{{"filename":"path","content":"COMPLETE file content","description":"what changed"}}]
If unsafe to automate: [{{"filename":"","content":"","description":"CANNOT_FIX: reason"}}]"""
              mode = "fix"

          elif cmd == "/ai-review":
              prompt = f"""Review the following for SkipStream browser extension and give specific, actionable feedback:

{args or comment_body}

CODEBASE:
{repo_context[:70000]}

Respond with a concise markdown review covering: correctness, architecture rule compliance, edge cases, suggestions."""
              mode = "review"

          elif cmd == "/ai-explain":
              target = args or issue_title
              prompt = f"""Explain how this works in the SkipStream codebase:
{target}

CODEBASE:
{repo_context[:70000]}

Give a clear, concise explanation with code references."""
              mode = "explain"

          elif cmd == "/ai-task":
              prompt = f"""You are a senior developer for SkipStream browser extension.

Task: {args}

Context (issue #{issue_num}): {issue_title}
{issue_body}

STRICT RULES: no localStorage/fetch in content script, no innerHTML, no console.log.

CODEBASE:
{repo_context[:70000]}

If this is a code change, respond with ONLY a JSON array:
[{{"filename":"path","content":"COMPLETE file content","description":"what changed"}}]
If this is a question/analysis, respond with markdown.
If unsafe: [{{"filename":"","content":"","description":"CANNOT_FIX: reason"}}]"""
              mode = "task"

          else:
              open("/tmp/ai_cmd_result.json","w").write(json.dumps({"type":"error","text":f"Unknown command: {cmd}"}))
              exit(0)

          def call_claude(p, max_tokens=8192):
              data = json.dumps({"model":"claude-sonnet-4-6","max_tokens":max_tokens,"messages":[{"role":"user","content":p}]}).encode()
              req = urllib.request.Request("https://api.anthropic.com/v1/messages", data=data,
                  headers={"Content-Type":"application/json","x-api-key":anthropic_key,"anthropic-version":"2023-06-01"}, method="POST")
              with urllib.request.urlopen(req, timeout=120) as r:
                  return json.load(r)["content"][0]["text"].strip()

          def call_gemini(p):
              data = json.dumps({"contents":[{"parts":[{"text":p}]}],"generationConfig":{"temperature":0.2,"maxOutputTokens":8192}}).encode()
              url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={gemini_key}"
              for attempt in range(4):
                  try:
                      req = urllib.request.Request(url, data=data, headers={"Content-Type":"application/json"}, method="POST")
                      with urllib.request.urlopen(req, timeout=90) as r:
                          return json.load(r)["candidates"][0]["content"]["parts"][0]["text"].strip()
                  except urllib.error.HTTPError as e:
                      if e.code == 429: time.sleep(30*(attempt+1))
                      else: raise
              raise RuntimeError("Gemini rate limit exceeded")

          try:
              text = call_claude(prompt) if anthropic_key else call_gemini(prompt)
              # Determine if response is JSON (code change) or markdown (explanation)
              stripped = text.strip()
              if stripped.startswith("```"): stripped = stripped.split("\n",1)[1].rsplit("```",1)[0].strip()
              is_json = stripped.startswith("[") or stripped.startswith("{")
              if is_json:
                  parsed = json.loads(stripped)
                  open("/tmp/ai_cmd_result.json","w").write(json.dumps({"type":"fix","data":parsed,"mode":mode}))
              else:
                  open("/tmp/ai_cmd_result.json","w").write(json.dumps({"type":"text","text":text,"mode":mode}))
              print(f"Command {cmd}: {'fix' if is_json else 'text'} response ({len(text)} chars)")
          except Exception as e:
              open("/tmp/ai_cmd_result.json","w").write(json.dumps({"type":"error","text":str(e)}))
          PYEOF

      - name: Apply result
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          CMD:          ${{ steps.cmd.outputs.command }}
        with:
          script: |
            const fs       = require('fs');
            const issueNum = parseInt(process.env.ISSUE_NUMBER);
            const issueTitle = process.env.ISSUE_TITLE;
            const cmd = process.env.CMD;

            const comment = async (body) => github.rest.issues.createComment({
              owner:context.repo.owner, repo:context.repo.repo, issue_number:issueNum, body
            });

            let result;
            try { result = JSON.parse(fs.readFileSync('/tmp/ai_cmd_result.json','utf8')); }
            catch(e) { await comment(`🤖 Command failed: could not read result.`); return; }

            if (result.type === 'error') { await comment(`🤖 **AI Command Error**\n\n${result.text}`); return; }

            // Text response (review, explain, or non-code task)
            if (result.type === 'text') {
              const icon = {'/ai-review':'🔍','/ai-explain':'📖','/ai-task':'🤖'}[cmd] || '🤖';
              await comment(`## ${icon} AI Response\n\n${result.text}\n\n---\n*Powered by ${process.env.ANTHROPIC_API_KEY ? 'Claude Sonnet' : 'Gemini 2.0 Flash'}*`);
              return;
            }

            // Code fix response - create PR
            const fixes = result.data;
            if (!Array.isArray(fixes) || !fixes[0]?.filename) {
              await comment(`## 🤖 AI Response — Manual Review Required\n\n${fixes?.[0]?.description || 'Could not safely automate this.'}`);
              return;
            }

            const branch = `ai-fix/issue-${issueNum}`;
            const { data: ref } = await github.rest.git.getRef({ owner:context.repo.owner, repo:context.repo.repo, ref:'heads/main' });
            try {
              await github.rest.git.createRef({ owner:context.repo.owner, repo:context.repo.repo, ref:`refs/heads/${branch}`, sha:ref.object.sha });
            } catch(e) {
              await github.rest.git.updateRef({ owner:context.repo.owner, repo:context.repo.repo, ref:`heads/${branch}`, sha:ref.object.sha, force:true });
            }

            const fileList = [];
            for (const fix of fixes) {
              if (!fix.filename || !fix.content) continue;
              let sha;
              try { ({ data: { sha } } = await github.rest.repos.getContent({ owner:context.repo.owner, repo:context.repo.repo, path:fix.filename, ref:branch })); } catch(e) {}
              await github.rest.repos.createOrUpdateFileContents({
                owner:context.repo.owner, repo:context.repo.repo, path:fix.filename,
                message:`fix: ${fix.description.slice(0,72)} (closes #${issueNum})`,
                content:Buffer.from(fix.content).toString('base64'), branch, ...(sha?{sha}:{})
              });
              fileList.push(`- \`${fix.filename}\`: ${fix.description}`);
            }

            const prBody = [`Closes #${issueNum}`,``,`## Changes`,fileList.join('\n'),``,`---`,
              `⚠️ **Review carefully before merging.**`,``,
              `- [ ] No \`localStorage\` or \`fetch()\` in content script`,
              `- [ ] No \`innerHTML\` or \`console.log\``,
              `- [ ] Logic correct`,`- [ ] Tested in Firefox`,
            ].join('\n');

            const { data: existing } = await github.rest.pulls.list({ owner:context.repo.owner, repo:context.repo.repo, head:`${context.repo.owner}:${branch}`, state:'open' });
            let pr;
            if (existing.length > 0) {
              await github.rest.pulls.update({ owner:context.repo.owner, repo:context.repo.repo, pull_number:existing[0].number, body:prBody });
              pr = existing[0];
            } else {
              ({ data: pr } = await github.rest.pulls.create({ owner:context.repo.owner, repo:context.repo.repo, title:`🤖 AI fix: ${issueTitle}`, head:branch, base:'main', body:prBody }));
            }
            await comment(`## 🤖 AI Fix PR Ready\n\nPR #${pr.number}: ${pr.html_url}\n\nCI running. Review and test in Firefox before merging.`);
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
