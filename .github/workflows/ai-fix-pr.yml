name: AI Fix → Pull Request

on:
  issues:
    types: [labeled]

jobs:
  create-fix-pr:
    if: |
      github.event.label.name == 'ai-fix' &&
      github.event.sender.login == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Build repo context for AI
        run: |
          echo "=== manifest.json ===" > /tmp/repo_context.txt
          cat manifest.json >> /tmp/repo_context.txt
          echo "" >> /tmp/repo_context.txt
          for f in background.js content-scripts/content.js options.js popup.js; do
            echo "=== $f ===" >> /tmp/repo_context.txt
            cat "$f" >> /tmp/repo_context.txt
            echo "" >> /tmp/repo_context.txt
          done
          echo "Context size: $(wc -c < /tmp/repo_context.txt) bytes"

      - name: Generate fix with Gemini
        id: fix
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error, time

          issue_num   = os.environ.get("ISSUE_NUMBER", "")
          issue_title = os.environ.get("ISSUE_TITLE", "")
          issue_body  = os.environ.get("ISSUE_BODY", "")

          anthropic_key = os.environ.get("ANTHROPIC_API_KEY", "")
          gemini_key    = os.environ.get("GEMINI_API_KEY", "")

          if not anthropic_key and not gemini_key:
              json.dump({"error": "NO_AI_KEY"}, open("/tmp/ai_fix.json", "w"))
              exit(0)

          with open("/tmp/repo_context.txt") as f:
              repo_context = f.read()

          prompt = f"""You are fixing a bug or implementing a feature for SkipStream, a Firefox browser extension.

          STRICT ARCHITECTURE RULES — CI will reject code that violates these:
          1. NEVER use localStorage in content-scripts/content.js — only browser.storage.local
          2. NEVER use fetch() in content-scripts/content.js — all API calls go through background.js via runtime.sendMessage
          3. NEVER use innerHTML — use DOM API: createElement, textContent, replaceChildren
          4. NEVER use console.log — only console.warn for diagnostics
          5. userId MUST be SHA-256 hash of "skipstream:uid:" + supabaseAnonKey — never random
          6. SPA nav MUST use pushState/replaceState intercept + popstate — no setInterval polling
          7. Video detection thresholds: 25% width, 20% height, aspect ratio 1.2-3.0

          ISSUE #{issue_num}: {issue_title}
          {issue_body}

          CURRENT CODEBASE:
          {repo_context[:60000]}

          Respond with ONLY a JSON array of file changes (no markdown, no explanation):
          [
            {{
              "filename": "path/to/file.js",
              "content": "complete new file content here",
              "description": "what changed and why"
            }}
          ]

          Rules:
          - Only include files that actually need to change
          - Always write the COMPLETE file content, not just the changed part
          - If you cannot safely fix this, return: [{{"filename": "", "content": "", "description": "CANNOT_FIX: reason"}}]
          """

          payload = json.dumps({
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.1, "maxOutputTokens": 8192}
          }).encode()

          def call_claude(prompt_text):
              p = json.dumps({
                  "model": "claude-sonnet-4-6",
                  "max_tokens": 8192,
                  "messages": [{"role": "user", "content": prompt_text}]
              }).encode()
              req = urllib.request.Request(
                  "https://api.anthropic.com/v1/messages",
                  data=p,
                  headers={
                      "Content-Type": "application/json",
                      "x-api-key": anthropic_key,
                      "anthropic-version": "2023-06-01",
                  },
                  method="POST"
              )
              with urllib.request.urlopen(req, timeout=90) as r:
                  data = json.load(r)
              return data["content"][0]["text"].strip()

          def call_gemini(prompt_text):
              p = json.dumps({
                  "contents": [{"parts": [{"text": prompt_text}]}],
                  "generationConfig": {"temperature": 0.1, "maxOutputTokens": 8192}
              }).encode()
              url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={gemini_key}"
              for attempt in range(4):
                  try:
                      req = urllib.request.Request(url, data=p, headers={"Content-Type": "application/json"}, method="POST")
                      with urllib.request.urlopen(req, timeout=60) as r:
                          data = json.load(r)
                      return data["candidates"][0]["content"]["parts"][0]["text"].strip()
                  except urllib.error.HTTPError as e:
                      if e.code == 429:
                          time.sleep(30 * (attempt + 1))
                      else:
                          raise
              raise RuntimeError("Gemini rate limit exceeded after 4 retries")

          text = None
          try:
              if anthropic_key:
                  text = call_claude(prompt)
                  print(f"Claude response ({len(text)} chars)")
              elif gemini_key:
                  text = call_gemini(prompt)
                  print(f"Gemini response ({len(text)} chars)")
              else:
                  json.dump({"error": "NO_AI_KEY"}, open("/tmp/ai_fix.json", "w"))
                  exit(0)
              # Strip markdown code fences if present
              if text.startswith("```"):
                  text = text.split("\n", 1)[1].rsplit("```", 1)[0].strip()
              json.loads(text)  # Validate JSON
              open("/tmp/ai_fix.json", "w").write(text)
          except Exception as e:
              json.dump({"error": str(e)}, open("/tmp/ai_fix.json", "w"))
          PYEOF

      - name: Apply fix and open PR
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        with:
          script: |
            const fs = require('fs');
            const issueNum = parseInt(process.env.ISSUE_NUMBER);
            const issueTitle = process.env.ISSUE_TITLE;

            const postComment = async (body) => {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNum, body
              });
            };

            let fixes;
            try {
              const raw = fs.readFileSync('/tmp/ai_fix.json', 'utf8');
              const parsed = JSON.parse(raw);
              // Handle error object from python
              if (!Array.isArray(parsed)) {
                await postComment(`## 🤖 AI Fix Failed\n\nError: \`${parsed.error || JSON.stringify(parsed)}\`\n\nManual fix needed.`);
                return;
              }
              fixes = parsed;
            } catch(e) {
              await postComment(`## 🤖 AI Fix Failed\n\nCould not parse AI response. Manual fix needed.\n\nError: ${e.message}`);
              return;
            }

            // AI said it can't fix this
            if (!fixes[0]?.filename) {
              await postComment(`## 🤖 AI Fix — Manual Review Required\n\n${fixes[0]?.description || 'No description'}\n\nThis issue needs human attention before an automated fix is safe.`);
              return;
            }

            // Create or reset branch
            const branch = `ai-fix/issue-${issueNum}`;
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner, repo: context.repo.repo,
              ref: 'heads/main'
            });

            try {
              await github.rest.git.createRef({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: `refs/heads/${branch}`, sha: ref.object.sha
              });
            } catch(e) {
              // Branch exists - update it to point at main
              await github.rest.git.updateRef({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: `heads/${branch}`, sha: ref.object.sha, force: true
              });
            }

            // Apply each file change
            const fileList = [];
            for (const fix of fixes) {
              if (!fix.filename || !fix.content) continue;

              let fileSha;
              try {
                const { data: existing } = await github.rest.repos.getContent({
                  owner: context.repo.owner, repo: context.repo.repo,
                  path: fix.filename, ref: branch
                });
                fileSha = existing.sha;
              } catch(e) { /* new file */ }

              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner, repo: context.repo.repo,
                path: fix.filename,
                message: `fix: ${fix.description.slice(0, 72)} (closes #${issueNum})`,
                content: Buffer.from(fix.content).toString('base64'),
                branch,
                ...(fileSha ? { sha: fileSha } : {})
              });
              fileList.push(`- \`${fix.filename}\`: ${fix.description}`);
            }

            // Check if PR already exists for this branch
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`, state: 'open'
            });

            let pr;
            if (existingPRs.length > 0) {
              // Update existing PR
              pr = existingPRs[0];
              await github.rest.pulls.update({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: pr.number,
                body: `Closes #${issueNum}\n\n## Changes\n${fileList.join('\n')}\n\n---\n⚠️ **Review carefully before merging.** CI runs automatically. Verify:\n- [ ] No \`localStorage\` or \`fetch()\` in content script\n- [ ] No \`innerHTML\` or \`console.log\`\n- [ ] Logic is correct for the reported issue\n- [ ] Tested manually in Firefox`
              });
            } else {
              const { data: newPR } = await github.rest.pulls.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🤖 AI fix: ${issueTitle}`,
                head: branch, base: 'main',
                body: `Closes #${issueNum}\n\n## Changes\n${fileList.join('\n')}\n\n---\n⚠️ **Review carefully before merging.** CI runs automatically. Verify:\n- [ ] No \`localStorage\` or \`fetch()\` in content script\n- [ ] No \`innerHTML\` or \`console.log\`\n- [ ] Logic is correct for the reported issue\n- [ ] Tested manually in Firefox`
              });
              pr = newPR;
            }

            await postComment(`## 🤖 AI Fix PR Ready\n\nPR #${pr.number}: ${pr.html_url}\n\nCI is running automatically. Please test in Firefox before merging.`);
