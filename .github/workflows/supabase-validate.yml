name: Validate Supabase Setup SQL

on:
  push:
    branches: [main]
    paths:
      - 'supabase_setup.sql'
  pull_request:
    branches: [main]
    paths:
      - 'supabase_setup.sql'
  workflow_dispatch:
    inputs:
      run_on_supabase:
        description: 'Apply setup.sql to configured Supabase project'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  validate-sql:
    name: Lint & Validate SQL
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate SQL syntax and completeness
        run: |
          python3 << 'PYEOF'
          import re, sys

          sql = open('supabase_setup.sql').read()
          errors = []

          # DO block balance - count literal 'do $$ begin' and 'end $$;' strings
          do_opens  = sql.count('do $$ begin')
          do_closes = sql.count('end $$;')
          if do_opens != do_closes:
              errors.append(f"DO block mismatch: {do_opens} opens vs {do_closes} closes")

          # Tables defined
          tables = re.findall(r'create table if not exists\s+(\S+)', sql, re.IGNORECASE)
          print(f"Tables: {tables}")
          for expected in ['public.playback_states', 'public.user_settings']:
              if expected not in tables:
                  errors.append(f"Missing table: {expected}")

          # RLS enabled
          for tbl in ['playback_states', 'user_settings']:
              if f'alter table public.{tbl} enable row level security' not in sql:
                  errors.append(f"RLS not enabled for {tbl}")

          # Policies: select/insert/update/delete for both tables
          for tbl_prefix in ['ss_anon', 'ss_settings']:
              for op in ['select', 'insert', 'update', 'delete']:
                  policy = f'{tbl_prefix}_{op}'
                  if policy not in sql:
                      errors.append(f"Missing policy: {policy}")

          # Verification function
          if 'ss_verify_setup' not in sql:
              errors.append("Missing ss_verify_setup() function")

          # Updated_at trigger function
          if 'ss_set_updated_at' not in sql:
              errors.append("Missing ss_set_updated_at() trigger function")

          if errors:
              for e in errors:
                  print(f"❌ {e}")
              sys.exit(1)
          print(f"✅ SQL validation passed ({len(sql)} chars, {len(tables)} tables)")
          PYEOF

      - name: Check idempotency
        run: |
          python3 << 'PYEOF'
          import re, sys
          sql = open('supabase_setup.sql').read()
          issues = []

          if re.search(r'create table (?!if not exists)', sql, re.IGNORECASE):
              issues.append("CREATE TABLE without IF NOT EXISTS")
          if re.search(r'create index (?!if not exists)', sql, re.IGNORECASE):
              issues.append("CREATE INDEX without IF NOT EXISTS")
          if re.search(r'create function (?!.*or replace)', sql, re.IGNORECASE | re.DOTALL):
              issues.append("CREATE FUNCTION without OR REPLACE")

          if issues:
              for i in issues: print(f"❌ {i}")
              sys.exit(1)
          print("✅ All statements are idempotent")
          PYEOF

      - name: Apply to Supabase (manual trigger only)
        if: github.event_name == 'workflow_dispatch' && inputs.run_on_supabase == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "❌ SUPABASE_DB_URL secret not set."
            echo "   Format: postgresql://postgres:[password]@db.[project-ref].supabase.co:5432/postgres"
            exit 1
          fi
          
          # Mask DB URL, password, and host to prevent printing to logs
          echo "::add-mask::$SUPABASE_DB_URL"
          python3 -c '
          import os, urllib.parse
          url = os.environ.get("SUPABASE_DB_URL", "")
          if url:
              try:
                  parsed = urllib.parse.urlparse(url)
                  if parsed.password:
                      print(f"::add-mask::{parsed.password}")
                  if parsed.hostname:
                      print(f"::add-mask::{parsed.hostname}")
              except Exception:
                  pass
          '

          sudo apt-get install -y postgresql-client -qq
          psql "$SUPABASE_DB_URL" -f supabase_setup.sql
          echo "✅ Setup SQL applied"

      - name: Summary
        if: always()
        run: |
          echo "## Supabase Setup SQL" >> $GITHUB_STEP_SUMMARY
          echo "File: \`supabase_setup.sql\` | Lines: $(wc -l < supabase_setup.sql)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To apply: paste into Supabase SQL Editor and run." >> $GITHUB_STEP_SUMMARY
          echo "To verify: \`select public.ss_verify_setup();\`" >> $GITHUB_STEP_SUMMARY
