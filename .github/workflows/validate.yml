name: Validate Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Lint & Validate

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JavaScript syntax
        run: |
          node --check background.js
          node --check options.js
          node --check popup.js
          node --check content-scripts/content.js
          echo "✅ All JS files pass syntax check"

      - name: Validate manifest.json
        run: |
          python3 -c "
          import json, sys
          with open('manifest.json') as f:
              m = json.load(f)
          assert m['manifest_version'] == 2, 'manifest_version must be 2'
          assert m['name'] == 'SkipStream', 'name mismatch'
          assert 'version' in m, 'version missing'
          assert 'background' in m, 'background missing'
          assert 'content_scripts' in m, 'content_scripts missing'
          assert 'storage' in m['permissions'], 'storage permission missing'
          assert 'tabs' in m['permissions'], 'tabs permission required for report tool'
          assert 'activeTab' not in m['permissions'], 'activeTab permission must not be present (unused)'
          assert 'content_security_policy' in m, 'CSP missing'
          gecko = m['browser_specific_settings']['gecko']
          assert 'id' in gecko, 'gecko.id missing'
          print('✅ manifest.json valid')
          "

      - name: Validate manifest-chrome.json version matches
        run: |
          FIREFOX_VER=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          CHROME_VER=$(python3 -c "import json; print(json.load(open('manifest-chrome.json'))['version'])")
          if [ "$FIREFOX_VER" != "$CHROME_VER" ]; then
            echo "❌ manifest-chrome.json version ($CHROME_VER) != manifest.json ($FIREFOX_VER)"
            exit 1
          fi
          echo "✅ manifest-chrome.json version matches: $CHROME_VER"

      - name: Check for innerHTML usage (security)
        run: |
          if grep -rn 'innerHTML' background.js options.js popup.js content-scripts/ \
             | grep -v '^\s*//' | grep -v '//.*innerHTML'; then
            echo "❌ innerHTML found — use DOM API instead"
            exit 1
          fi
          echo "✅ No innerHTML usage"

      - name: Check for console.log (should use console.warn only)
        run: |
          if grep -rn 'console\.log' background.js options.js popup.js content-scripts/ \
             | grep -v '^\s*//'; then
            echo "❌ console.log found — use console.warn for diagnostics"
            exit 1
          fi
          echo "✅ No console.log usage"

      - name: Check for localStorage usage in content script
        run: |
          if grep -n 'localStorage' content-scripts/content.js \
             | grep -v '^\s*[0-9]*:\s*//' | grep -v '//.*localStorage'; then
            echo "❌ localStorage found in content script — must use browser.storage.local"
            exit 1
          fi
          echo "✅ No localStorage in content script"

      - name: Check for hardcoded secrets or API keys
        run: |
          if grep -rn 'eyJ\|sk-\|AIza\|xoxb-\|supabase\.co.*Bearer\|anon.*key.*=.*[a-zA-Z0-9+/]\{40\}' \
             background.js content-scripts/content.js popup.js options.js 2>/dev/null \
             | grep -v '^\s*//' | grep -v 'placeholder\|example\|YOUR_KEY'; then
            echo "❌ Possible hardcoded secret or API key found"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

      - name: Build release ZIP
        run: |
          zip -r skipstream-firefox.zip \
            manifest.json background.js \
            content-scripts/ icons/ \
            popup.html popup.js \
            options.html options.js \
            supabase_setup.sql
          echo "✅ ZIP built: $(du -h skipstream-firefox.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skipstream-firefox-zip
          path: "skipstream-firefox.zip"
          retention-days: 30
