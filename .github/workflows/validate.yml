name: Validate Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Lint & Validate

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check JavaScript syntax
        run: |
          node --check background.js
          node --check options.js
          node --check popup.js
          node --check content-scripts/content.js
          echo "✅ All JS files pass syntax check"

      - name: Validate manifest.json
        run: |
          python3 -c "
          import json, sys
          with open('manifest.json') as f:
              m = json.load(f)
          assert m['manifest_version'] == 2, 'manifest_version must be 2'
          assert m['name'] == 'SkipStream', 'name mismatch'
          assert 'version' in m, 'version missing'
          assert 'background' in m, 'background missing'
          assert 'content_scripts' in m, 'content_scripts missing'
          assert 'storage' in m['permissions'], 'storage permission missing'
          assert 'tabs' in m['permissions'], 'tabs permission required for report tool'
          assert 'activeTab' not in m['permissions'], 'activeTab permission must not be present (unused)'
          assert 'content_security_policy' in m, 'CSP missing'
          gecko = m['browser_specific_settings']['gecko']
          assert 'id' in gecko, 'gecko.id missing'
          assert 'update_url' in gecko, 'gecko.update_url missing (required for Firefox Android auto-update)'
          print('✅ manifest.json valid')
          "

      - name: Validate manifest-chrome.json
        run: |
          python3 -c "
          import json
          with open('manifest-chrome.json') as f:
              m = json.load(f)
          assert m['manifest_version'] == 3, 'manifest_version must be 3 for Chrome'
          assert 'service_worker' in m.get('background', {}), 'Chrome manifest must use service_worker'
          assert 'host_permissions' in m, 'Chrome MV3 needs host_permissions'
          assert '<all_urls>' in m['host_permissions'], 'host_permissions must include <all_urls>'
          print('✅ manifest-chrome.json valid')
          "

      - name: Version consistency check
        run: |
          FIREFOX_VER=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          CHROME_VER=$(python3 -c "import json; print(json.load(open('manifest-chrome.json'))['version'])")
          if [ "$FIREFOX_VER" != "$CHROME_VER" ]; then
            echo "❌ manifest-chrome.json version ($CHROME_VER) != manifest.json ($FIREFOX_VER)"
            exit 1
          fi
          echo "✅ manifest-chrome.json version matches: $CHROME_VER"

      - name: Validate updates.json
        run: |
          python3 -c "
          import json
          d = json.load(open('updates.json'))
          assert 'addons' in d, 'updates.json missing addons key'
          addon = d['addons'].get('skipstream@extension')
          assert addon, 'skipstream@extension entry missing'
          updates = addon.get('updates', [])
          assert updates, 'updates array is empty'
          for u in updates:
              assert 'version' in u, f'update entry missing version: {u}'
              assert 'update_link' in u, f'update entry missing update_link: {u}'
              assert u['update_link'].endswith('.zip'), f'update_link should point to ZIP: {u[\"update_link\"]}'
          manifest_ver = json.load(open('manifest.json'))['version']
          latest = updates[-1]['version']
          assert latest == manifest_ver, f'updates.json latest version ({latest}) != manifest version ({manifest_ver})'
          print(f'✅ updates.json valid - latest: {latest}')
          "


      - name: Check manifest strict_min_version is reasonable
        run: |
          python3 -c "
          import json
          m = json.load(open('manifest.json'))
          gecko = m['browser_specific_settings']['gecko']
          min_ver_str = gecko.get('strict_min_version', '0')
          min_ver = float(min_ver_str.split('.')[0])
          # Warn if strict_min_version is very high (blocks most users)
          # Firefox releases ~4 versions/year; current stable is roughly 130-142 range (2026)
          if min_ver > 145:
              print(f'❌ strict_min_version {min_ver_str} is too high - blocks most Firefox users')
              exit(1)
          if min_ver < 109:
              print(f'❌ strict_min_version {min_ver_str} is too low - use at least 109 for MV2 baseline')
              exit(1)
          print(f'✅ strict_min_version {min_ver_str} is within acceptable range')
          "

      - name: Check for innerHTML usage (security)
        run: |
          if grep -rn 'innerHTML' background.js options.js popup.js content-scripts/ \
             | grep -v '^\s*//' | grep -v '//.*innerHTML'; then
            echo "❌ innerHTML found — use DOM API instead"
            exit 1
          fi
          echo "✅ No innerHTML usage"

      - name: Check for console.log (should use console.warn only)
        run: |
          if grep -rn 'console\.log' background.js options.js popup.js content-scripts/ \
             | grep -v '^\s*//'; then
            echo "❌ console.log found — use console.warn for diagnostics"
            exit 1
          fi
          echo "✅ No console.log usage"

      - name: Check for localStorage usage in content script
        run: |
          if grep -n 'localStorage' content-scripts/content.js \
             | grep -v '^\s*[0-9]*:\s*//' | grep -v '//.*localStorage'; then
            echo "❌ localStorage found in content script — must use browser.storage.local"
            exit 1
          fi
          echo "✅ No localStorage in content script"

      - name: Check for fetch() usage in content script
        run: |
          if grep -n '\bfetch(' content-scripts/content.js \
             | grep -v '^\s*[0-9]*:\s*//' | grep -v '//.*fetch'; then
            echo "❌ fetch() found in content script — all network calls must go via background.js runtime.sendMessage"
            exit 1
          fi
          echo "✅ No direct fetch() in content script"

      - name: Check for hardcoded secrets or API keys
        run: |
          if grep -rn 'eyJ\|sk-\|AIza\|xoxb-\|supabase\.co.*Bearer\|anon.*key.*=.*[a-zA-Z0-9+/]\{40\}' \
             background.js content-scripts/content.js popup.js options.js 2>/dev/null \
             | grep -v '^\s*//' | grep -v 'placeholder\|example\|YOUR_KEY'; then
            echo "❌ Possible hardcoded secret or API key found"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

      - name: Build Firefox release ZIP
        run: |
          zip -r skipstream-firefox.zip \
            manifest.json background.js \
            content-scripts/ icons/ \
            popup.html popup.js \
            options.html options.js
          echo "✅ Firefox ZIP built: $(du -h skipstream-firefox.zip | cut -f1)"

      - name: Build Chrome release ZIP
        run: |
          # Chrome ZIP uses manifest-chrome.json renamed to manifest.json
          mkdir -p /tmp/chrome-build
          cp -r content-scripts icons popup.html popup.js options.html options.js background.js /tmp/chrome-build/
          cp manifest-chrome.json /tmp/chrome-build/manifest.json
          cd /tmp/chrome-build && zip -r /home/runner/work/openskip/openskip/skipstream-chrome.zip .
          cd /home/runner/work/openskip/openskip
          echo "✅ Chrome ZIP built: $(du -h skipstream-chrome.zip | cut -f1)"

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v7
        with:
          name: skipstream-firefox-zip
          path: skipstream-firefox.zip
          retention-days: 7

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v7
        with:
          name: skipstream-chrome-zip
          path: skipstream-chrome.zip
          retention-days: 7
