name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      changelog:
        description: 'CHANGELOG entry (leave blank to auto-generate with AI)'
        required: false
        default: ''

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new version
        id: ver
        run: |
          CURRENT=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          python3 - << PYEOF
          import sys
          current = "$CURRENT"
          bump    = "${{ inputs.bump }}"
          parts   = list(map(int, current.split('.')))
          while len(parts) < 3:
              parts.append(0)
          if bump == 'major': parts[0]+=1; parts[1]=0; parts[2]=0
          elif bump == 'minor': parts[1]+=1; parts[2]=0
          else: parts[2]+=1
          new_ver = '.'.join(map(str, parts))
          print(f"::notice::Bumping {current} → {new_ver}")
          with open('/tmp/new_version.txt','w') as f: f.write(new_ver)
          PYEOF
          NEW=$(cat /tmp/new_version.txt)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW"         >> $GITHUB_OUTPUT
          echo "Bumping: $CURRENT → $NEW"

      - name: Generate changelog entry with AI
        id: notes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: |
          MANUAL="${{ inputs.changelog }}"
          if [ -n "$MANUAL" ]; then
            echo "$MANUAL" > /tmp/changelog_entry.txt
            echo "Using manual changelog entry"
            exit 0
          fi

          python3 << 'PYEOF'
          import os, json, urllib.request, datetime

          new_ver  = open('/tmp/new_version.txt').read().strip()
          today    = datetime.date.today().isoformat()
          bump     = os.environ.get('INPUT_BUMP', 'patch')

          # Get recent commits for context
          import subprocess
          try:
              commits = subprocess.check_output(
                  ['git', 'log', '--oneline', '-20', '--no-merges'],
                  text=True
              ).strip()
          except Exception:
              commits = '(could not read git log)'

          prompt = (
              f"Generate a concise CHANGELOG.md entry for SkipStream browser extension v{new_ver} ({bump} release).\n"
              f"Today: {today}\n\nRecent commits:\n{commits}\n\n"
              "Format exactly like this (no other text):\n"
              f"## [{new_ver}] - {today}\n### Changed\n- ...\n### Fixed\n- ...\n"
              "Only include sections that apply. Keep each point under 80 chars. "
              "Focus on user-visible changes. Skip CI/workflow changes."
          )

          entry = None

          # Try Claude first
          anthropic_key = os.environ.get('ANTHROPIC_API_KEY', '')
          if anthropic_key:
              try:
                  payload = json.dumps({
                      "model": "claude-sonnet-4-6",
                      "max_tokens": 500,
                      "messages": [{"role": "user", "content": prompt}]
                  }).encode()
                  req = urllib.request.Request(
                      "https://api.anthropic.com/v1/messages",
                      data=payload,
                      headers={
                          "Content-Type": "application/json",
                          "x-api-key": anthropic_key,
                          "anthropic-version": "2023-06-01",
                      },
                      method="POST"
                  )
                  with urllib.request.urlopen(req, timeout=30) as r:
                      data = json.load(r)
                  entry = data['content'][0]['text'].strip()
                  print("Generated via Claude")
              except Exception as e:
                  print(f"Claude failed: {e}")

          # Fallback to Gemini
          if not entry:
              gemini_key = os.environ.get('GEMINI_API_KEY', '')
              if gemini_key:
                  try:
                      payload = json.dumps({
                          "contents": [{"parts": [{"text": prompt}]}],
                          "generationConfig": {"temperature": 0.3, "maxOutputTokens": 500}
                      }).encode()
                      req = urllib.request.Request(
                          f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={gemini_key}",
                          data=payload,
                          headers={"Content-Type": "application/json"},
                          method="POST"
                      )
                      with urllib.request.urlopen(req, timeout=30) as r:
                          data = json.load(r)
                      entry = data['candidates'][0]['content']['parts'][0]['text'].strip()
                      print("Generated via Gemini")
                  except Exception as e:
                      print(f"Gemini failed: {e}")

          # Fallback: minimal template
          if not entry:
              entry = f"## [{new_ver}] - {today}\n### Changed\n- {bump.capitalize()} release\n"
              print("Using fallback template")

          with open('/tmp/changelog_entry.txt', 'w') as f:
              f.write(entry)
          print("Entry:", entry[:200])
          PYEOF
        env:
          INPUT_BUMP: ${{ inputs.bump }}

      - name: Apply version bump
        run: |
          NEW="${{ steps.ver.outputs.new }}"
          OLD="${{ steps.ver.outputs.current }}"

          # manifest.json
          python3 -c "
          import json
          m = json.load(open('manifest.json'))
          m['version'] = '$NEW'
          json.dump(m, open('manifest.json','w'), indent=2)
          print(f'manifest.json: {m[\"version\"]}')
          "

          # manifest-chrome.json
          python3 -c "
          import json
          m = json.load(open('manifest-chrome.json'))
          m['version'] = '$NEW'
          json.dump(m, open('manifest-chrome.json','w'), indent=2)
          print(f'manifest-chrome.json: {m[\"version\"]}')
          "

          # popup.js header comment
          sed -i "s/\* SkipStream v${OLD}/\* SkipStream v${NEW}/g" popup.js || true

          # Prepend changelog entry
          ENTRY=$(cat /tmp/changelog_entry.txt)
          python3 - << PYEOF
          entry = open('/tmp/changelog_entry.txt').read().strip()
          cl    = open('CHANGELOG.md').read()
          # Insert after the first heading line
          lines = cl.split('\n')
          insert_at = 0
          for i, l in enumerate(lines):
              if l.startswith('## ['):
                  insert_at = i
                  break
          lines.insert(insert_at, '')
          lines.insert(insert_at, entry)
          open('CHANGELOG.md', 'w').write('\n'.join(lines))
          print('CHANGELOG.md updated')
          PYEOF

          echo "✅ All files bumped to $NEW"

      - name: Open Pull Request
        uses: actions/github-script@v9
        with:
          script: |
            const newVer = '${{ steps.ver.outputs.new }}';
            const oldVer = '${{ steps.ver.outputs.current }}';
            const bump   = '${{ inputs.bump }}';
            const fs     = require('fs');
            const entry  = fs.readFileSync('/tmp/changelog_entry.txt', 'utf8').trim();

            // Create branch
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner, repo: context.repo.repo, ref: 'heads/main'
            });
            const branch = `chore/bump-v${newVer}`;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: `refs/heads/${branch}`, sha: ref.object.sha
              });
            } catch(e) {
              await github.rest.git.updateRef({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: `heads/${branch}`, sha: ref.object.sha, force: true
              });
            }

            // Push each changed file
            const files = ['manifest.json', 'manifest-chrome.json', 'popup.js', 'CHANGELOG.md'];
            for (const f of files) {
              let sha;
              try {
                const { data: existing } = await github.rest.repos.getContent({
                  owner: context.repo.owner, repo: context.repo.repo, path: f, ref: branch
                });
                sha = existing.sha;
              } catch(e) {}
              const { execSync } = require('child_process');
              const content = require('fs').readFileSync(f);
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner, repo: context.repo.repo,
                path: f,
                message: `chore: bump version to v${newVer}`,
                content: content.toString('base64'),
                branch,
                ...(sha ? { sha } : {})
              });
            }

            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `chore: bump version ${oldVer} → ${newVer} (${bump})`,
              head: branch, base: 'main',
              body: `## Version Bump: ${oldVer} → ${newVer}\n\n**Bump type:** ${bump}\n\n${entry}\n\n---\nAfter merging: tag with \`git tag v${newVer} && git push origin v${newVer}\` to trigger release.`
            });

            core.notice(`PR created: ${pr.html_url}`);
            console.log(`✅ PR #${pr.number}: ${pr.html_url}`);
