name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      changelog:
        description: 'CHANGELOG entry (blank = AI-generated)'
        required: false
        default: ''

jobs:
  bump:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new version
        id: ver
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          CURRENT_VER=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          CURRENT_VER=$CURRENT_VER BUMP=$BUMP python3 - << 'PYEOF'
          import os, sys
          current = os.environ['CURRENT_VER']
          bump    = os.environ['BUMP']
          parts   = list(map(int, current.split('.')))
          while len(parts) < 3:
              parts.append(0)
          if   bump == 'major': parts[0]+=1; parts[1]=0; parts[2]=0
          elif bump == 'minor': parts[1]+=1; parts[2]=0
          else:                 parts[2]+=1
          new_ver = '.'.join(map(str, parts))
          with open('/tmp/new_version.txt','w') as f: f.write(new_ver)
          print(f'Bumping {current} -> {new_ver}')
          PYEOF
          NEW=$(cat /tmp/new_version.txt)
          echo "current=$CURRENT_VER" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"             >> "$GITHUB_OUTPUT"

      - name: Generate changelog entry
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          INPUT_BUMP:        ${{ inputs.bump }}
          INPUT_CHANGELOG:   ${{ inputs.changelog }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, datetime, subprocess

          manual = os.environ.get('INPUT_CHANGELOG', '').strip()
          if manual:
              open('/tmp/changelog_entry.txt', 'w').write(manual)
              print("Using manual changelog entry")
              exit(0)

          new_ver = open('/tmp/new_version.txt').read().strip()
          today   = datetime.date.today().isoformat()
          bump    = os.environ.get('INPUT_BUMP', 'patch')

          try:
              commits = subprocess.check_output(
                  ['git', 'log', '--oneline', '-20', '--no-merges'], text=True
              ).strip()
          except Exception:
              commits = '(unavailable)'

          prompt = (
              f"Generate a concise CHANGELOG.md entry for SkipStream browser extension v{new_ver} ({bump} release).\n"
              f"Today: {today}\nRecent commits:\n{commits}\n\n"
              "Format exactly (no other text):\n"
              f"## [{new_ver}] - {today}\n### Changed\n- ...\n\n"
              "Only include sections that apply (Changed/Fixed/Added). Under 80 chars per point. "
              "Focus on user-visible changes only. Skip CI/workflow/chore commits."
          )

          entry = None
          anthropic_key = os.environ.get('ANTHROPIC_API_KEY', '')
          gemini_key    = os.environ.get('GEMINI_API_KEY', '')

          if anthropic_key:
              try:
                  p = json.dumps({
                      "model": "claude-sonnet-4-6", "max_tokens": 500,
                      "messages": [{"role": "user", "content": prompt}]
                  }).encode()
                  req = urllib.request.Request(
                      "https://api.anthropic.com/v1/messages", data=p,
                      headers={"Content-Type": "application/json",
                               "x-api-key": anthropic_key,
                               "anthropic-version": "2023-06-01"},
                      method="POST"
                  )
                  with urllib.request.urlopen(req, timeout=30) as r:
                      data = json.load(r)
                  entry = data['content'][0]['text'].strip()
                  print("Generated via Claude")
              except Exception as e:
                  print(f"Claude failed: {e}")

          if not entry and gemini_key:
              import time
              for attempt in range(4):
                  try:
                      p = json.dumps({
                          "contents": [{"parts": [{"text": prompt}]}],
                          "generationConfig": {"temperature": 0.3, "maxOutputTokens": 500}
                      }).encode()
                      req = urllib.request.Request(
                          f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={gemini_key}",
                          data=p, headers={"Content-Type": "application/json"}, method="POST"
                      )
                      with urllib.request.urlopen(req, timeout=30) as r:
                          data = json.load(r)
                      entry = data['candidates'][0]['content']['parts'][0]['text'].strip()
                      print("Generated via Gemini")
                      break
                  except Exception as e:
                      if attempt == 3:
                          print(f"Gemini failed: {e}")
                      else:
                          time.sleep(10 * (attempt + 1))

          if not entry:
              entry = f"## [{new_ver}] - {today}\n### Changed\n- {bump.capitalize()} release\n"
              print("Using fallback template")

          open('/tmp/changelog_entry.txt', 'w').write(entry)
          print("Entry preview:", entry[:200])
          PYEOF

      - name: Apply version bump to files
        env:
          NEW_VER: ${{ steps.ver.outputs.new }}
          OLD_VER: ${{ steps.ver.outputs.current }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - << 'PYEOF'
          import os, json, re
          
          new_ver = os.environ['NEW_VER']
          old_ver = os.environ['OLD_VER']
          repo = os.environ['GITHUB_REPOSITORY']
          
          # 1. Update manifest.json
          m = json.load(open('manifest.json'))
          m['version'] = new_ver
          json.dump(m, open('manifest.json', 'w'), indent=2)
          open('manifest.json', 'a').write('\n')
          print('manifest.json ->', new_ver)
          
          # 2. Update manifest-chrome.json
          m_chrome = json.load(open('manifest-chrome.json'))
          m_chrome['version'] = new_ver
          json.dump(m_chrome, open('manifest-chrome.json', 'w'), indent=2)
          open('manifest-chrome.json', 'a').write('\n')
          print('manifest-chrome.json ->', new_ver)
          
          # 3. Update popup.js version header comment
          popup_path = 'popup.js'
          if os.path.exists(popup_path):
              popup = open(popup_path).read()
              popup_updated = popup.replace(f'SkipStream v{old_ver}', f'SkipStream v{new_ver}')
              popup_updated = popup_updated.replace(f'popup v{old_ver}', f'popup v{new_ver}')
              open(popup_path, 'w').write(popup_updated)
              print('popup.js version comment updated')
              
          # 4. Update updates.json
          updates_path = 'updates.json'
          if os.path.exists(updates_path):
              data = json.load(open(updates_path))
              entry = {
                  'version': new_ver,
                  'update_link': f'https://github.com/{repo}/releases/download/v{new_ver}/skipstream-{new_ver}-firefox.zip',
                  'update_info_url': f'https://github.com/{repo}/releases/tag/v{new_ver}'
              }
              updates = data['addons']['skipstream@extension']['updates']
              if not any(u['version'] == new_ver for u in updates):
                  updates.append(entry)
              data['addons']['skipstream@extension']['updates'] = updates[-10:]
              json.dump(data, open(updates_path, 'w'), indent=2)
              open(updates_path, 'a').write('\n')
              print('updates.json updated to v', new_ver)
              
          # 5. Update README.md version badge
          readme_path = 'README.md'
          if os.path.exists(readme_path):
              readme = open(readme_path).read()
              readme_updated = re.sub(r'version-[0-9]+\.[0-9]+\.[0-9]+', f'version-{new_ver}', readme)
              readme_updated = re.sub(r'tag/v[0-9]+\.[0-9]+\.[0-9]+', f'tag/v{new_ver}', readme_updated)
              open(readme_path, 'w').write(readme_updated)
              print('README.md version badge updated')
              
          # 6. Update CHANGELOG.md
          changelog_entry_path = '/tmp/changelog_entry.txt'
          if os.path.exists(changelog_entry_path):
              entry = open(changelog_entry_path).read().strip()
              cl = open('CHANGELOG.md').read()
              lines = cl.split('\n')
              insert_at = next((i for i, l in enumerate(lines) if l.startswith('## [')), 0)
              lines.insert(insert_at, '')
              lines.insert(insert_at, entry)
              open('CHANGELOG.md', 'w').write('\n'.join(lines))
              print('CHANGELOG.md updated')
          PYEOF
          echo "All files bumped to $NEW_VER"

      - name: Push branch and open Pull Request
        env:
          NEW_VER: ${{ steps.ver.outputs.new }}
          OLD_VER: ${{ steps.ver.outputs.current }}
          BUMP:    ${{ inputs.bump }}
        run: |
          BRANCH="chore/bump-v${NEW_VER}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to (or create) the bump branch from current HEAD
          git checkout -B "$BRANCH"
          git add manifest.json manifest-chrome.json popup.js CHANGELOG.md updates.json README.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to v${NEW_VER}"
          git push origin "$BRANCH" --force

          echo "Branch pushed: $BRANCH"

      - name: Create Pull Request
        uses: actions/github-script@v7
        env:
          NEW_VER: ${{ steps.ver.outputs.new }}
          OLD_VER: ${{ steps.ver.outputs.current }}
          BUMP:    ${{ inputs.bump }}
        with:
          script: |
            const fs     = require('fs');
            const newVer = process.env.NEW_VER;
            const oldVer = process.env.OLD_VER;
            const bump   = process.env.BUMP;
            const branch = `chore/bump-v${newVer}`;
            const entry  = fs.existsSync('/tmp/changelog_entry.txt')
              ? fs.readFileSync('/tmp/changelog_entry.txt', 'utf8').trim()
              : `Bump ${oldVer} → ${newVer}`;

            // Check for existing open PR for this branch
            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            if (existing.length > 0) {
              core.notice(`PR already exists: #${existing[0].number} ${existing[0].html_url}`);
              return;
            }

            const body = [
              `## Version Bump: ${oldVer} → ${newVer}`,
              '',
              `**Bump type:** ${bump}`,
              '',
              entry,
              '',
              '---',
              'After merging, create the release tag:',
              '```',
              `git pull && git tag v${newVer} && git push origin v${newVer}`,
              '```',
              'The **Build & Release** workflow will then build ZIPs, create the GitHub Release,',
              'update `updates.json`, and trigger AMO + Chrome Web Store submission automatically.'
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `chore: bump ${oldVer} → ${newVer} (${bump})`,
              head: branch, base: 'main', body
            });
            core.notice(`PR #${pr.number}: ${pr.html_url}`);
