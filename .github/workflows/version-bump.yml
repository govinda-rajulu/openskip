name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      changelog:
        description: 'CHANGELOG entry (blank = AI-generated)'
        required: false
        default: ''

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new version
        id: ver
        run: |
          CURRENT=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          BUMP="${{ inputs.bump }}"
          python3 -c "
          import sys
          current = '$CURRENT'
          bump    = '$BUMP'
          parts   = list(map(int, current.split('.')))
          while len(parts) < 3:
              parts.append(0)
          if   bump == 'major': parts[0]+=1; parts[1]=0; parts[2]=0
          elif bump == 'minor': parts[1]+=1; parts[2]=0
          else:                 parts[2]+=1
          new_ver = '.'.join(map(str, parts))
          with open('/tmp/new_version.txt','w') as f: f.write(new_ver)
          print(f'Bumping {current} -> {new_ver}')
          "
          NEW=$(cat /tmp/new_version.txt)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"         >> "$GITHUB_OUTPUT"

      - name: Generate changelog entry
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          INPUT_BUMP:        ${{ inputs.bump }}
          INPUT_CHANGELOG:   ${{ inputs.changelog }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, datetime, subprocess

          manual = os.environ.get('INPUT_CHANGELOG', '').strip()
          if manual:
              open('/tmp/changelog_entry.txt', 'w').write(manual)
              print("Using manual changelog entry")
              exit(0)

          new_ver = open('/tmp/new_version.txt').read().strip()
          today   = datetime.date.today().isoformat()
          bump    = os.environ.get('INPUT_BUMP', 'patch')

          try:
              commits = subprocess.check_output(
                  ['git', 'log', '--oneline', '-20', '--no-merges'], text=True
              ).strip()
          except Exception:
              commits = '(unavailable)'

          prompt = (
              f"Generate a concise CHANGELOG.md entry for SkipStream browser extension v{new_ver} ({bump} release).\n"
              f"Today: {today}\nRecent commits:\n{commits}\n\n"
              "Format exactly (no other text):\n"
              f"## [{new_ver}] - {today}\n### Changed\n- ...\n\n"
              "Only include sections that apply (Changed/Fixed/Added). Under 80 chars per point. "
              "Focus on user-visible changes only. Skip CI/workflow/chore commits."
          )

          entry = None
          anthropic_key = os.environ.get('ANTHROPIC_API_KEY', '')
          gemini_key    = os.environ.get('GEMINI_API_KEY', '')

          if anthropic_key:
              try:
                  p = json.dumps({
                      "model": "claude-sonnet-4-6", "max_tokens": 500,
                      "messages": [{"role": "user", "content": prompt}]
                  }).encode()
                  req = urllib.request.Request(
                      "https://api.anthropic.com/v1/messages", data=p,
                      headers={"Content-Type": "application/json",
                               "x-api-key": anthropic_key,
                               "anthropic-version": "2023-06-01"},
                      method="POST"
                  )
                  with urllib.request.urlopen(req, timeout=30) as r:
                      data = json.load(r)
                  entry = data['content'][0]['text'].strip()
                  print("Generated via Claude")
              except Exception as e:
                  print(f"Claude failed: {e}")

          if not entry and gemini_key:
              import time
              for attempt in range(4):
                  try:
                      p = json.dumps({
                          "contents": [{"parts": [{"text": prompt}]}],
                          "generationConfig": {"temperature": 0.3, "maxOutputTokens": 500}
                      }).encode()
                      req = urllib.request.Request(
                          f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={gemini_key}",
                          data=p, headers={"Content-Type": "application/json"}, method="POST"
                      )
                      with urllib.request.urlopen(req, timeout=30) as r:
                          data = json.load(r)
                      entry = data['candidates'][0]['content']['parts'][0]['text'].strip()
                      print("Generated via Gemini")
                      break
                  except Exception as e:
                      if attempt == 3:
                          print(f"Gemini failed: {e}")
                      else:
                          time.sleep(10 * (attempt + 1))

          if not entry:
              entry = f"## [{new_ver}] - {today}\n### Changed\n- {bump.capitalize()} release\n"
              print("Using fallback template")

          open('/tmp/changelog_entry.txt', 'w').write(entry)
          print("Entry preview:", entry[:200])
          PYEOF

      - name: Apply version bump to files
        run: |
          NEW="${{ steps.ver.outputs.new }}"
          OLD="${{ steps.ver.outputs.current }}"

          python3 -c "
          import json
          m = json.load(open('manifest.json'))
          m['version'] = '$NEW'
          json.dump(m, open('manifest.json','w'), indent=2)
          open('manifest.json','a').write('\n')
          print('manifest.json ->', m['version'])
          "

          python3 -c "
          import json
          m = json.load(open('manifest-chrome.json'))
          m['version'] = '$NEW'
          json.dump(m, open('manifest-chrome.json','w'), indent=2)
          open('manifest-chrome.json','a').write('\n')
          print('manifest-chrome.json ->', m['version'])
          "

          sed -i "s/SkipStream v${OLD}/SkipStream v${NEW}/g" popup.js || true

          python3 << 'PYEOF'
          entry = open('/tmp/changelog_entry.txt').read().strip()
          cl    = open('CHANGELOG.md').read()
          lines = cl.split('\n')
          insert_at = next((i for i,l in enumerate(lines) if l.startswith('## [')), 0)
          lines.insert(insert_at, '')
          lines.insert(insert_at, entry)
          open('CHANGELOG.md', 'w').write('\n'.join(lines))
          print('CHANGELOG.md updated')
          PYEOF

          echo "All files bumped to $NEW"

      - name: Push branch and open Pull Request
        env:
          NEW_VER: ${{ steps.ver.outputs.new }}
          OLD_VER: ${{ steps.ver.outputs.current }}
          BUMP:    ${{ inputs.bump }}
        run: |
          BRANCH="chore/bump-v${NEW_VER}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to (or create) the bump branch from current HEAD
          git checkout -B "$BRANCH"
          git add manifest.json manifest-chrome.json popup.js CHANGELOG.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to v${NEW_VER}"
          git push origin "$BRANCH" --force

          echo "Branch pushed: $BRANCH"

      - name: Create Pull Request
        uses: actions/github-script@v7
        env:
          NEW_VER: ${{ steps.ver.outputs.new }}
          OLD_VER: ${{ steps.ver.outputs.current }}
          BUMP:    ${{ inputs.bump }}
        with:
          script: |
            const fs     = require('fs');
            const newVer = process.env.NEW_VER;
            const oldVer = process.env.OLD_VER;
            const bump   = process.env.BUMP;
            const branch = `chore/bump-v${newVer}`;
            const entry  = fs.existsSync('/tmp/changelog_entry.txt')
              ? fs.readFileSync('/tmp/changelog_entry.txt', 'utf8').trim()
              : `Bump ${oldVer} → ${newVer}`;

            // Check for existing open PR for this branch
            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            if (existing.length > 0) {
              core.notice(`PR already exists: #${existing[0].number} ${existing[0].html_url}`);
              return;
            }

            const body = [
              `## Version Bump: ${oldVer} → ${newVer}`,
              '',
              `**Bump type:** ${bump}`,
              '',
              entry,
              '',
              '---',
              'After merging, create the release tag:',
              '```',
              `git pull && git tag v${newVer} && git push origin v${newVer}`,
              '```',
              'The **Build & Release** workflow will then build ZIPs, create the GitHub Release,',
              'update `updates.json`, and trigger AMO + Chrome Web Store submission automatically.'
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `chore: bump ${oldVer} → ${newVer} (${bump})`,
              head: branch, base: 'main', body
            });
            core.notice(`PR #${pr.number}: ${pr.html_url}`);
