name: Build & Release ZIP

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate JS syntax
        run: |
          node --check background.js
          node --check options.js
          node --check popup.js
          node --check content-scripts/content.js
          echo "✅ All JS files valid"

      - name: Security checks
        run: |
          FAIL=0
          if grep -rn 'innerHTML' background.js options.js popup.js content-scripts/ | grep -v '^\s*//' | grep -v '//.*innerHTML'; then
            echo "❌ innerHTML found"; FAIL=1
          fi
          if grep -rn 'console\.log' background.js options.js popup.js content-scripts/ | grep -v '^\s*//'; then
            echo "❌ console.log found"; FAIL=1
          fi
          if grep -n 'localStorage' content-scripts/content.js | grep -v '^\s*[0-9]*:\s*//' | grep -v '//.*localStorage'; then
            echo "❌ localStorage in content script"; FAIL=1
          fi
          [ $FAIL -eq 1 ] && exit 1
          echo "✅ Security checks passed"

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Manifest version: $VERSION"

      - name: Check tag matches manifest version
        run: |
          TAG="${{ github.ref_name }}"
          MANIFEST_VER="${{ steps.version.outputs.version }}"
          TAG_VER="${TAG#v}"
          if [ "$TAG_VER" != "$MANIFEST_VER" ]; then
            echo "❌ Tag $TAG does not match manifest version $MANIFEST_VER"
            exit 1
          fi
          echo "✅ Tag $TAG matches manifest version $MANIFEST_VER"

      - name: Check manifest-chrome.json version matches
        run: |
          CHROME_VER=$(python3 -c "import json; print(json.load(open('manifest-chrome.json'))['version'])")
          MANIFEST_VER="${{ steps.version.outputs.version }}"
          if [ "$CHROME_VER" != "$MANIFEST_VER" ]; then
            echo "❌ manifest-chrome.json version $CHROME_VER != manifest.json $MANIFEST_VER"
            exit 1
          fi
          echo "✅ manifest-chrome.json version matches"

      - name: Check CHANGELOG has entry for this version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "\[${VERSION}\]" CHANGELOG.md; then
            echo "❌ CHANGELOG.md missing entry for v${VERSION}"
            exit 1
          fi
          echo "✅ CHANGELOG.md has entry for v${VERSION}"

      - name: Update updates.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Write new updates.json
          python3 - << PYEOF
import json
with open('updates.json') as f:
    u = json.load(f)
addon_id = list(u['addons'].keys())[0]
u['addons'][addon_id]['updates'] = [{
    'version': '${VERSION}',
    'update_link': f'https://github.com/govinda-rajulu/openskip/releases/download/v${VERSION}/skipstream-${VERSION}-firefox.zip',
    'update_info_url': f'https://github.com/govinda-rajulu/openskip/releases/tag/v${VERSION}'
}]
with open('updates.json', 'w') as f:
    json.dump(u, f, indent=2)
    f.write('\n')
print('updates.json updated to ${VERSION}')
PYEOF
          # Commit via GitHub API (works on detached HEAD / tag checkout)
          CONTENT=$(base64 -w0 updates.json)
          CURRENT_SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/updates.json" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          curl -s -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/updates.json" \
            -d "{"message":"chore: update updates.json to v${VERSION} [skip ci]","content":"$CONTENT","sha":"$CURRENT_SHA"}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('committed:', d.get('commit',{}).get('sha','ERR: '+str(d.get('message','')))[:20])"

      - name: Build ZIP
        run: |
          ZIP_NAME="skipstream-${{ steps.version.outputs.version }}-firefox.zip"
          zip -r "$ZIP_NAME" \
            manifest.json background.js \
            content-scripts/ icons/ \
            popup.html popup.js \
            options.html options.js \
            supabase_setup.sql
          echo "✅ Built: $(du -h $ZIP_NAME | cut -f1)"

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "skipstream-${{ steps.version.outputs.version }}-firefox.zip"
          fail_on_unmatched_files: true
          generate_release_notes: false

      - name: Upload ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: skipstream-firefox-zip
          path: "skipstream-${{ steps.version.outputs.version }}-firefox.zip"
          retention-days: 1
