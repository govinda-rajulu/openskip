name: Build & Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate JS syntax
        run: |
          node --check background.js
          node --check options.js
          node --check popup.js
          node --check content-scripts/content.js
          echo "✅ All JS files valid"

      - name: Security checks
        run: |
          FAIL=0
          if grep -rn 'innerHTML' background.js options.js popup.js content-scripts/ | grep -v '^\s*//' | grep -v '//.*innerHTML'; then
            echo "❌ innerHTML found"; FAIL=1
          fi
          if grep -rn 'console\.log' background.js options.js popup.js content-scripts/ | grep -v '^\s*//'; then
            echo "❌ console.log found"; FAIL=1
          fi
          if grep -n 'localStorage' content-scripts/content.js | grep -v '^\s*[0-9]*:\s*//' | grep -v '//.*localStorage'; then
            echo "❌ localStorage in content script"; FAIL=1
          fi
          if grep -n '\bfetch(' content-scripts/content.js | grep -v '^\s*[0-9]*:\s*//' | grep -v '//.*fetch'; then
            echo "❌ fetch() in content script"; FAIL=1
          fi
          [ $FAIL -eq 1 ] && exit 1
          echo "✅ Security checks passed"

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Manifest version: $VERSION"

      - name: Check tag matches manifest version
        env:
          TAG_NAME: ${{ github.ref_name }}
          MANIFEST_VER: ${{ steps.version.outputs.version }}
        run: |
          TAG_VER="${TAG_NAME#v}"
          if [ "$TAG_VER" != "$MANIFEST_VER" ]; then
            echo "❌ Tag $TAG_NAME does not match manifest version $MANIFEST_VER"
            exit 1
          fi
          echo "✅ Tag $TAG_NAME matches manifest version $MANIFEST_VER"

      - name: Check manifest-chrome.json version matches
        env:
          MANIFEST_VER: ${{ steps.version.outputs.version }}
        run: |
          CHROME_VER=$(python3 -c "import json; print(json.load(open('manifest-chrome.json'))['version'])")
          if [ "$CHROME_VER" != "$MANIFEST_VER" ]; then
            echo "❌ manifest-chrome.json version $CHROME_VER != manifest.json $MANIFEST_VER"
            exit 1
          fi
          echo "✅ manifest-chrome.json version matches"

      - name: Check CHANGELOG has entry for this version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! grep -q "\[${VERSION}\]" CHANGELOG.md; then
            echo "❌ CHANGELOG.md missing entry for v${VERSION}"
            exit 1
          fi
          echo "✅ CHANGELOG.md has entry for v${VERSION}"

      - name: Extract changelog notes
        id: notes
        run: |
          python3 - << 'PYEOF'
          import re, json, os
          version = json.load(open('manifest.json'))['version']
          try:
              cl = open('CHANGELOG.md').read()
              m = re.search(r'## \[' + re.escape(version) + r'\][^\n]*\n([\s\S]*?)(?=\n## \[|\Z)', cl)
              text = m.group(1) if m else ''
              text = text.strip()[:4000]
          except Exception:
              text = f'Release v{version}'
          open('/tmp/release_notes.md', 'w').write(text)
          print(f'Extracted {len(text)} chars of release notes')
          PYEOF

      - name: Build Firefox ZIP
        id: build_firefox
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ZIP_NAME="skipstream-${VERSION}-firefox.zip"
          zip -r "$ZIP_NAME" \
            manifest.json background.js \
            content-scripts/ icons/ \
            popup.html popup.js popup.css \
            options.html options.js options.css
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "✅ Firefox ZIP built: $(du -h $ZIP_NAME | cut -f1)"

      - name: Build Chrome ZIP
        id: build_chrome
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ZIP_NAME="skipstream-${VERSION}-chrome.zip"
          rm -rf /tmp/chrome-build
          mkdir -p /tmp/chrome-build
          cp -r content-scripts icons popup.html popup.js popup.css options.html options.js options.css background.js /tmp/chrome-build/
          cp manifest-chrome.json /tmp/chrome-build/manifest.json
          cd /tmp/chrome-build && zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" .
          cd "$GITHUB_WORKSPACE"
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "✅ Chrome ZIP built: $(du -h $ZIP_NAME | cut -f1)"

      - name: Update updates.json and commit
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          version = os.environ['VERSION']
          repo = os.environ['GITHUB_REPOSITORY']
          data = json.load(open('updates.json'))
          entry = {
              "version": version,
              "update_link": f"https://github.com/{repo}/releases/download/v{version}/skipstream-{version}-firefox.zip",
              "update_info_url": f"https://github.com/{repo}/releases/tag/v{version}"
          }
          updates = data['addons']['skipstream@extension']['updates']
          existing = [i for i, u in enumerate(updates) if u['version'] == version]
          if existing:
              updates[existing[0]] = entry
          else:
              updates.append(entry)
          data['addons']['skipstream@extension']['updates'] = updates[-10:]
          json.dump(data, open('updates.json', 'w'), indent=2)
          print(f'updates.json updated to v{version}')
          PYEOF
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.json
          git diff --staged --quiet || git commit -m "chore: update updates.json for v${VERSION} [skip ci]"
          git push origin HEAD:main || echo "⚠ Push skipped (no changes or tag ref)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.build_firefox.outputs.zip_name }}
            ${{ steps.build_chrome.outputs.zip_name }}
          fail_on_unmatched_files: true
          generate_release_notes: false
          body_path: /tmp/release_notes.md

      - name: Upload Firefox artifact (for AMO workflow)
        uses: actions/upload-artifact@v4
        with:
          name: skipstream-firefox-zip
          path: ${{ steps.build_firefox.outputs.zip_name }}
          retention-days: 3

      - name: Upload Chrome artifact (for CWS workflow)
        uses: actions/upload-artifact@v4
        with:
          name: skipstream-chrome-zip
          path: ${{ steps.build_chrome.outputs.zip_name }}
          retention-days: 3

      - name: Release summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FF: ${{ steps.build_firefox.outputs.zip_name }}
          CR: ${{ steps.build_chrome.outputs.zip_name }}
        run: |
          echo "## ✅ Release v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`$FF\` | $(du -h "$FF" | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`$CR\` | $(du -h "$CR" | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION}" >> $GITHUB_STEP_SUMMARY
