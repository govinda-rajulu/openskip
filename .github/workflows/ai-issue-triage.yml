name: AI Issue Triage

on:
  issues:
    types: [opened, reopened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Triage issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE:       ${{ github.event.issue.title }}
          ISSUE_BODY:        ${{ github.event.issue.body }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error, time

          title         = os.environ.get("ISSUE_TITLE", "")
          body          = os.environ.get("ISSUE_BODY", "")
          anthropic_key = os.environ.get("ANTHROPIC_API_KEY", "")
          gemini_key    = os.environ.get("GEMINI_API_KEY", "")

          if not anthropic_key and not gemini_key:
              json.dump({"status": "NO_KEY"}, open("/tmp/triage.json", "w"))
              exit(0)

          prompt = (
              "You are triaging GitHub issues for SkipStream — a Firefox/Chrome browser extension "
              "that skips intros/recaps/outros on streaming sites (IntroDB + AnimeSkip APIs) and syncs "
              "playback position via user-owned Supabase. Plain JS, Firefox MV2 + Chrome MV3, no build step.\n"
              "Architecture rules: no localStorage in content script, no fetch() in content script, "
              "no innerHTML, no console.log, userId=SHA256(supabase_anon_key).\n\n"
              "Reply ONLY with a JSON object, no markdown:\n"
              '{"type":"bug","priority":"high","component":"content-script",'
              '"summary":"one sentence","suggestion":"actionable fix in 1-2 sentences",'
              '"needs_ai_fix":true,"complexity":"simple"}\n\n'
              "Valid types: bug, feature, question, docs\n"
              "Valid priorities: high, medium, low\n"
              "Valid components: content-script, background, popup, options, manifest, workflow, docs\n"
              "Valid complexity: simple (single file, clear fix), moderate (multi-file), complex (architecture change)\n"
              "needs_ai_fix=true only for bugs/features where the fix is concrete and safe to automate\n\n"
              f"Title: {title}\nBody: {body}"
          )

          text = None
          try:
              if anthropic_key:
                  p = json.dumps({
                      "model": "claude-sonnet-4-6", "max_tokens": 500,
                      "messages": [{"role": "user", "content": prompt}]
                  }).encode()
                  req = urllib.request.Request(
                      "https://api.anthropic.com/v1/messages", data=p,
                      headers={"Content-Type": "application/json", "x-api-key": anthropic_key, "anthropic-version": "2023-06-01"},
                      method="POST"
                  )
                  with urllib.request.urlopen(req, timeout=30) as r:
                      data = json.load(r)
                  text = data["content"][0]["text"].strip()
                  print("Triage via Claude")
              else:
                  p = json.dumps({
                      "contents": [{"parts": [{"text": prompt}]}],
                      "generationConfig": {"temperature": 0.1, "maxOutputTokens": 500}
                  }).encode()
                  url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={gemini_key}"
                  for attempt in range(4):
                      try:
                          req = urllib.request.Request(url, data=p, headers={"Content-Type": "application/json"}, method="POST")
                          with urllib.request.urlopen(req, timeout=30) as r:
                              data = json.load(r)
                          text = data["candidates"][0]["content"]["parts"][0]["text"].strip()
                          break
                      except urllib.error.HTTPError as e:
                          if e.code == 429: time.sleep(30 * (attempt + 1))
                          else: raise
                  if text is None:
                      json.dump({"status": "RATE_LIMITED"}, open("/tmp/triage.json", "w"))
                      exit(0)
                  print("Triage via Gemini")

              if text.startswith("```"):
                  text = text.split("\n", 1)[1].rsplit("```", 1)[0].strip()
              result = json.loads(text)
              result["status"] = "OK"
              json.dump(result, open("/tmp/triage.json", "w"))
              print("Triage:", result.get("type"), result.get("priority"), result.get("complexity"))
          except Exception as e:
              json.dump({"status": f"ERROR:{e}"}, open("/tmp/triage.json", "w"))
          PYEOF

      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let triage = {};
            try { triage = JSON.parse(fs.readFileSync('/tmp/triage.json', 'utf8')); } catch(e) { return; }
            if (triage.status !== 'OK') return;

            const labelMap = {
              type:      { bug:'bug', feature:'enhancement', question:'question', docs:'documentation' },
              priority:  { high:'priority: high', medium:'priority: medium', low:'priority: low' },
              component: {
                'content-script':'component: content-script', background:'component: background',
                popup:'component: popup', options:'component: options',
                manifest:'component: manifest', workflow:'component: workflow',
              },
            };
            const labels = [];
            if (labelMap.type[triage.type])           labels.push(labelMap.type[triage.type]);
            if (labelMap.priority[triage.priority])   labels.push(labelMap.priority[triage.priority]);
            if (labelMap.component[triage.component]) labels.push(labelMap.component[triage.component]);
            if (!labels.length) return;

            for (const label of labels) {
              try { await github.rest.issues.createLabel({ owner:context.repo.owner, repo:context.repo.repo, name:label, color:'ededed' }); } catch(e) {}
            }
            await github.rest.issues.addLabels({ owner:context.repo.owner, repo:context.repo.repo, issue_number:context.issue.number, labels });

      - name: Post triage comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              const r = JSON.parse(fs.readFileSync('/tmp/triage.json', 'utf8'));
              if (r.status === 'NO_KEY') return;
              if (r.status === 'OK') {
                const te = {bug:'🐛',feature:'✨',question:'❓',docs:'📝'}[r.type] || '🔍';
                const pe = {high:'🔴',medium:'🟡',low:'🟢'}[r.priority] || '⚪';
                const cx = {simple:'⚡ simple',moderate:'🔧 moderate',complex:'🏗️ complex'}[r.complexity] || '';
                body =
                  `## 🤖 AI Triage\n\n` +
                  `**Type:** ${te} ${r.type} &nbsp;|&nbsp; **Priority:** ${pe} ${r.priority} &nbsp;|&nbsp; **Component:** \`${r.component}\`` +
                  (cx ? ` &nbsp;|&nbsp; **Complexity:** ${cx}` : '') + `\n\n` +
                  `**Analysis:** ${r.summary}\n\n` +
                  `**Suggestion:** ${r.suggestion}\n\n---\n` +
                  (r.needs_ai_fix
                    ? `> 💡 Looks automatable — add the \`ai-fix\` label to have the AI agent open a PR.`
                    : `> ℹ️ Needs discussion or manual implementation before automated fix is safe.`) +
                  `\n\n*Powered by ${process.env.ANTHROPIC_API_KEY ? 'Claude Sonnet' : 'Gemini 2.0 Flash'}*`;
              } else {
                body = `## 🤖 AI Triage\n\n_Unavailable (${r.status}). Manual review needed._`;
              }
            } catch(e) {
              body = `## 🤖 AI Triage\n\n_Could not read triage result: ${e.message}_`;
            }
            if (body) await github.rest.issues.createComment({ owner:context.repo.owner, repo:context.repo.repo, issue_number:context.issue.number, body });
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
