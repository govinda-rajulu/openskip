name: AI Issue Triage

on:
  issues:
    types: [opened, reopened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Triage with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error, time

          api_key = os.environ.get("GEMINI_API_KEY","")
          title   = os.environ.get("ISSUE_TITLE","")
          body    = os.environ.get("ISSUE_BODY","")

          if not api_key:
              json.dump({"status":"NO_KEY"}, open("/tmp/triage.json","w"))
              exit(0)

          prompt = (
              "You are reviewing GitHub issues for SkipStream — a Firefox browser extension "
              "that skips intros/recaps/outros on streaming sites (IntroDB API) and syncs "
              "playback position via user-owned Supabase. Plain JS, MV2, no build step. "
              "Rules: no localStorage in content script, no fetch() in content script, "
              "no innerHTML, no console.log, userId=SHA256(supabase_anon_key).\n\n"
              "Reply ONLY with a JSON object, no markdown:\n"
              '{"type":"bug","priority":"high","component":"content-script",'
              '"summary":"one sentence","suggestion":"actionable fix","needs_ai_fix":true}\n\n'
              f"Title: {title}\nBody: {body}"
          )

          payload = json.dumps({
              "contents":[{"parts":[{"text":prompt}]}],
              "generationConfig":{"temperature":0.1,"maxOutputTokens":400}
          }).encode()

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={api_key}"
          data = None

          for attempt in range(4):
              try:
                  req = urllib.request.Request(url, data=payload, headers={"Content-Type":"application/json"}, method="POST")
                  with urllib.request.urlopen(req, timeout=30) as r:
                      data = json.load(r)
                  break
              except urllib.error.HTTPError as e:
                  if e.code == 429:
                      wait = 30 * (attempt + 1)
                      print(f"429 rate limit — waiting {wait}s (attempt {attempt+1}/4)")
                      time.sleep(wait)
                  else:
                      json.dump({"status":f"HTTP_ERROR_{e.code}"}, open("/tmp/triage.json","w"))
                      exit(0)
              except Exception as e:
                  json.dump({"status":f"ERROR:{e}"}, open("/tmp/triage.json","w"))
                  exit(0)

          if data is None:
              json.dump({"status":"RATE_LIMITED"}, open("/tmp/triage.json","w"))
              exit(0)

          try:
              text = data["candidates"][0]["content"]["parts"][0]["text"]
              text = text.strip()
              if text.startswith("```"):
                  text = text.split("\n",1)[1].rsplit("```",1)[0].strip()
              result = json.loads(text)
              result["status"] = "OK"
              json.dump(result, open("/tmp/triage.json","w"))
              print("Triage complete:", result.get("type"), result.get("priority"))
          except Exception as e:
              json.dump({"status":f"PARSE_ERROR:{e}","raw":text[:200]}, open("/tmp/triage.json","w"))
          PYEOF

      - name: Post triage comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let body = '';

            try {
              const r = JSON.parse(fs.readFileSync('/tmp/triage.json','utf8'));
              const status = r.status || 'UNKNOWN';

              if (status === 'OK') {
                const te = {bug:'🐛',feature:'✨',question:'❓',docs:'📝'}[r.type] || '🔍';
                const pe = {high:'🔴',medium:'🟡',low:'🟢'}[r.priority] || '⚪';
                body =
                  `## 🤖 AI Triage\n\n` +
                  `**Type:** ${te} ${r.type} &nbsp;|&nbsp; **Priority:** ${pe} ${r.priority} &nbsp;|&nbsp; **Component:** \`${r.component}\`\n\n` +
                  `**Analysis:** ${r.summary}\n\n` +
                  `**Suggestion:** ${r.suggestion}\n\n---\n` +
                  (r.needs_ai_fix
                    ? `> 💡 Looks automatable — add the \`ai-fix\` label to have the AI open a PR.`
                    : `> ℹ️ Needs discussion before automated fix.`) +
                  `\n\n*Powered by Gemini 2.0 Flash — always verify before acting.*`;
              } else if (status === 'RATE_LIMITED') {
                body = `## 🤖 AI Triage\n\n⏳ Gemini rate limit reached after 4 retries. Manual review needed for now — triage will work on the next issue automatically.`;
              } else {
                body = `## 🤖 AI Triage\n\n_Unavailable (${status}). Manual review needed._`;
              }
            } catch(e) {
              body = `## 🤖 AI Triage\n\n_Could not read triage result: ${e.message}_`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
