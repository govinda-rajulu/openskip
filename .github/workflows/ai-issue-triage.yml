name: AI Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Analyze issue with Gemini
        id: ai
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Write issue content to file to avoid shell escaping issues
          cat > /tmp/issue.txt << 'ISSUEEOF'
          ${{ github.event.issue.title }}
          ${{ github.event.issue.body }}
          ISSUEEOF

          ISSUE_CONTENT=$(cat /tmp/issue.txt)

          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error

          api_key = os.environ.get("GEMINI_API_KEY", "")
          if not api_key:
              print("NO_KEY")
              exit(0)

          with open("/tmp/issue.txt") as f:
              issue = f.read().strip()

          prompt = """You are a senior developer reviewing issues for SkipStream — a Firefox browser extension that:
          - Skips intros/recaps/outros on any streaming site using IntroDB API
          - Syncs playback position across devices via user-owned Supabase
          - Written in plain JavaScript, no build step, Manifest V2

          Key architecture rules (violations are bugs):
          - No localStorage in content script — must use browser.storage.local
          - No fetch() in content script — all API calls go through background.js via runtime.sendMessage
          - No innerHTML — use DOM API only
          - No console.log — only console.warn for diagnostics
          - userId = SHA-256 hash of Supabase anon key — never random
          - SPA navigation via pushState/replaceState intercept — no polling

          Given this issue, respond with ONLY a JSON object (no markdown, no explanation):
          {
            "type": "bug|feature|question|docs",
            "priority": "high|medium|low",
            "component": "content-script|background|options|popup|supabase|ci|other",
            "summary": "one sentence analysis",
            "suggestion": "specific technical suggestion referencing the codebase",
            "needs_ai_fix": true/false
          }

          Issue:
          """ + issue

          payload = {
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.1, "maxOutputTokens": 500}
          }

          req = urllib.request.Request(
              f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={api_key}",
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST"
          )

          try:
              with urllib.request.urlopen(req) as r:
                  data = json.load(r)
                  text = data["candidates"][0]["content"]["parts"][0]["text"]
                  # Strip markdown fences if present
                  text = text.strip().strip("```json").strip("```").strip()
                  result = json.loads(text)
                  with open("/tmp/ai_result.json", "w") as f:
                      json.dump(result, f)
                  print("OK")
          except Exception as e:
              print(f"ERROR: {e}")
          PYEOF

      - name: Post triage comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '';

            try {
              const result = JSON.parse(fs.readFileSync('/tmp/ai_result.json', 'utf8'));

              const typeEmoji = {bug:'🐛', feature:'✨', question:'❓', docs:'📝'}[result.type] || '🔍';
              const prioEmoji = {high:'🔴', medium:'🟡', low:'🟢'}[result.priority] || '⚪';

              comment = `## 🤖 AI Triage

**Type:** ${typeEmoji} ${result.type} &nbsp;&nbsp; **Priority:** ${prioEmoji} ${result.priority} &nbsp;&nbsp; **Component:** \`${result.component}\`

**Analysis:** ${result.summary}

**Suggestion:** ${result.suggestion}

---
${result.needs_ai_fix
  ? '> 💡 This looks like a well-defined fix. Add the `ai-fix` label to have the AI attempt a pull request automatically.'
  : '> ℹ️ This may need manual discussion before an automated fix is appropriate.'
}

*Triage by Gemini 2.0 Flash — always verify before acting on suggestions.*`;

            } catch(e) {
              comment = `## 🤖 AI Triage\n\n_AI triage unavailable — GEMINI_API_KEY may not be configured or the AI returned an unexpected response. Manual review needed._`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
