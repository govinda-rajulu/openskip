name: AI Issue Triage

on:
  issues:
    types: [opened, reopened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Analyze issue with Gemini
        id: ai
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request

          api_key = os.environ.get("GEMINI_API_KEY", "")
          title   = os.environ.get("ISSUE_TITLE", "")
          body    = os.environ.get("ISSUE_BODY", "")

          if not api_key:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("result=NO_KEY\n")
              exit(0)

          prompt = (
              "You are reviewing issues for SkipStream — a Firefox extension that skips intros/recaps/outros "
              "on streaming sites (IntroDB API) and syncs playback via user-owned Supabase. "
              "Plain JavaScript, MV2, no build step. Key rules: no localStorage in content script, "
              "no fetch() in content script (must go via background.js), no innerHTML, no console.log.\n\n"
              "Respond ONLY with valid JSON (no markdown):\n"
              '{"type":"bug|feature|question|docs","priority":"high|medium|low",'
              '"component":"content-script|background|options|popup|supabase|ci|other",'
              '"summary":"one sentence","suggestion":"specific fix approach","needs_ai_fix":true}\n\n'
              f"Issue title: {title}\nIssue body: {body}"
          )

          payload = {
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.1, "maxOutputTokens": 400}
          }

          try:
              req = urllib.request.Request(
                  f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={api_key}",
                  data=json.dumps(payload).encode(),
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.load(r)
                  text = data["candidates"][0]["content"]["parts"][0]["text"]
                  text = text.strip().strip("```json").strip("```").strip()
                  result = json.loads(text)
                  with open("/tmp/ai_result.json", "w") as f:
                      json.dump(result, f)
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("result=OK\n")
          except Exception as e:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"result=ERROR:{e}\n")
          PYEOF

      - name: Post triage comment
        uses: actions/github-script@v7
        env:
          AI_STATUS: ${{ steps.ai.outputs.result }}
        with:
          script: |
            const fs = require('fs');
            const status = process.env.AI_STATUS || '';
            let comment = '';

            if (status === 'OK') {
              const result = JSON.parse(fs.readFileSync('/tmp/ai_result.json', 'utf8'));
              const typeEmoji  = {bug:'🐛',feature:'✨',question:'❓',docs:'📝'}[result.type] || '🔍';
              const prioEmoji  = {high:'🔴',medium:'🟡',low:'🟢'}[result.priority] || '⚪';
              comment = `## 🤖 AI Triage\n\n**Type:** ${typeEmoji} ${result.type} &nbsp; **Priority:** ${prioEmoji} ${result.priority} &nbsp; **Component:** \`${result.component}\`\n\n**Analysis:** ${result.summary}\n\n**Suggestion:** ${result.suggestion}\n\n---\n${result.needs_ai_fix ? '> 💡 Add the `ai-fix` label to have the AI attempt a pull request.' : '> ℹ️ This may need manual discussion first.'}\n\n*Powered by Gemini 2.0 Flash — verify before acting.*`;
            } else {
              comment = `## 🤖 AI Triage\n\n_Triage unavailable (${status}). Manual review needed._`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
