name: Submit to AMO

on:
  workflow_run:
    workflows: ["Build & Release ZIP"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no AMO writes)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: amo-submit
  cancel-in-progress: false

jobs:
  submit:
    name: Submit & update AMO listing
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6 # v4

      - name: Set up Node.js
        uses: actions/setup-node@v4 # v4
        with:
          node-version: '22'

      - name: Download release ZIP (from triggering workflow)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8 # v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: skipstream-firefox-zip
          path: .
        continue-on-error: true

      - name: Build ZIP (fallback / manual trigger)
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          ZIP_NAME="skipstream-${VERSION}-firefox.zip"
          if [ ! -f "$ZIP_NAME" ]; then
            echo "Building $ZIP_NAME from source…"
            zip -r "$ZIP_NAME" \
              manifest.json background.js \
              content-scripts/ icons/ \
              popup.html popup.js \
              options.html options.js \
              supabase_setup.sql
            echo "✅ Built: $(du -h $ZIP_NAME | cut -f1)"
          else
            echo "✅ Using artifact: $ZIP_NAME"
          fi

      - name: Submit to AMO
        env:
          AMO_API_KEY:    ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
          AMO_ADDON_SLUG: skipstream
          DRY_RUN:        ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '1' || '0' }}
        run: |
          # Extract release notes inline (no heredoc)
          python3 -c "
          import re, json
          version = json.load(open('manifest.json'))['version']
          try:
              cl = open('CHANGELOG.md').read()
              m = re.search(r'## \[' + re.escape(version) + r'\][^\n]*\n([\s\S]*?)(?=\n## \[|\Z)', cl)
              text = m.group(1) if m else ''
              text = re.sub(r'###[^\n]*\n', '', text)
              text = re.sub(r'\*\*(.*?)\*\*', r'\1', text)
              print(text.strip()[:3000])
          except Exception:
              print('')
          " > /tmp/release_notes.txt

          export RELEASE_NOTES="$(cat /tmp/release_notes.txt)"
          node scripts/amo-update.js


      - name: Summary on success
        if: success()
        run: |
          echo "## ✅ AMO Submission Complete" >> $GITHUB_STEP_SUMMARY
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Listing:** https://addons.mozilla.org/en-US/firefox/addon/skipstream/" >> $GITHUB_STEP_SUMMARY
          echo "**Dev Hub:** https://addons.mozilla.org/en-US/developers/addon/skipstream/versions" >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ❌ AMO Submission Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the step logs above for the error." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Common causes:" >> $GITHUB_STEP_SUMMARY
          echo "- \`AMO_API_KEY\` / \`AMO_API_SECRET\` secrets not set" >> $GITHUB_STEP_SUMMARY
          echo "- ZIP failed validation" >> $GITHUB_STEP_SUMMARY
          echo "- Add-on slug not yet claimed (submit first version manually)" >> $GITHUB_STEP_SUMMARY
