name: Submit to AMO

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to submit (leave blank to use manifest.json)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no AMO writes)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: amo-submit
  cancel-in-progress: false

jobs:
  submit:
    name: Submit & update AMO listing
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Submitting version: $VERSION"

      - name: Download release artifact (from triggering workflow)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: skipstream-firefox-zip
          path: .
        continue-on-error: true

      - name: Build ZIP (fallback for manual trigger or missing artifact)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ZIP_NAME="skipstream-${VERSION}-firefox.zip"
          if [ -f "$ZIP_NAME" ]; then
            echo "✅ Using downloaded artifact: $ZIP_NAME"
          else
            echo "Building $ZIP_NAME from source..."
            zip -r "$ZIP_NAME" \
              manifest.json background.js \
              content-scripts/ icons/ \
              popup.html popup.js \
              options.html options.js
            echo "✅ Built: $(du -h $ZIP_NAME | cut -f1)"
          fi

      - name: Check AMO secrets configured
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          if [ -z "$AMO_API_KEY" ] || [ -z "$AMO_API_SECRET" ]; then
            echo "❌ AMO_API_KEY or AMO_API_SECRET secrets not set."
            echo "   Go to Settings > Secrets and variables > Actions to add them."
            echo "   Get keys from: https://addons.mozilla.org/en-US/developers/addon/api/key/"
            exit 1
          fi
          echo "✅ AMO secrets configured"

      - name: Extract release notes
        run: |
          python3 - << 'PYEOF'
          import re, json, os
          version = os.environ.get('VERSION', '')
          if not version:
              version = json.load(open('manifest.json'))['version']
          try:
              cl = open('CHANGELOG.md').read()
              m = re.search(r'## \[' + re.escape(version) + r'\][^\n]*\n([\s\S]*?)(?=\n## \[|\Z)', cl)
              text = m.group(1) if m else ''
              text = re.sub(r'###[^\n]*\n', '', text)
              text = re.sub(r'\*\*(.*?)\*\*', r'\1', text)
              text = text.strip()[:3000]
          except Exception:
              text = ''
          open('/tmp/release_notes.txt', 'w').write(text)
          print(f'Release notes: {len(text)} chars')
          PYEOF
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Submit to AMO
        env:
          AMO_API_KEY:    ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
          AMO_ADDON_SLUG: skipstream
          DRY_RUN:        ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '1' || '0' }}
          RELEASE_NOTES:  ""
        run: |
          export RELEASE_NOTES="$(cat /tmp/release_notes.txt)"
          node scripts/amo-update.js

      - name: Summary on success
        if: success()
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "## ✅ AMO Submission Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Listing:** https://addons.mozilla.org/en-US/firefox/addon/skipstream/" >> $GITHUB_STEP_SUMMARY
          echo "**Dev Hub:** https://addons.mozilla.org/en-US/developers/addon/skipstream/versions" >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ❌ AMO Submission Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the step logs above for the error." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Common causes:" >> $GITHUB_STEP_SUMMARY
          echo "- \`AMO_API_KEY\` / \`AMO_API_SECRET\` secrets not set or expired" >> $GITHUB_STEP_SUMMARY
          echo "- ZIP failed AMO validation (check extension structure)" >> $GITHUB_STEP_SUMMARY
          echo "- Add-on slug not yet claimed (submit first version manually via AMO Dev Hub)" >> $GITHUB_STEP_SUMMARY
          echo "- Version already exists on AMO (409 - already submitted)" >> $GITHUB_STEP_SUMMARY
