name: Submit to Chrome Web Store

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate only, no CWS writes)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: cws-submit
  cancel-in-progress: false

jobs:
  submit:
    name: Submit to Chrome Web Store
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest-chrome.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Chrome version: $VERSION"

      - name: Check CWS secrets configured
        id: check_secrets
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          if [ -z "$CWS_EXTENSION_ID" ] || \
             [ -z "$CWS_CLIENT_ID" ] || \
             [ -z "$CWS_CLIENT_SECRET" ] || \
             [ -z "$CWS_REFRESH_TOKEN" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠ CWS secrets not configured - skipping Chrome Web Store submission."
            echo "  Required: CWS_EXTENSION_ID, CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN"
            echo "  See: https://developer.chrome.com/docs/webstore/using-api/"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "✅ CWS secrets configured"
          fi

      - name: Download Chrome ZIP artifact (from triggering workflow)
        if: github.event_name == 'workflow_run' && steps.check_secrets.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: skipstream-chrome-zip
          path: .
        continue-on-error: true

      - name: Build Chrome ZIP (fallback / manual trigger)
        if: steps.check_secrets.outputs.configured == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ZIP_NAME="skipstream-${VERSION}-chrome.zip"
          if [ -f "$ZIP_NAME" ]; then
            echo "✅ Using downloaded artifact: $ZIP_NAME"
          else
            echo "Building $ZIP_NAME from source..."
            rm -rf /tmp/chrome-build
            mkdir -p /tmp/chrome-build
            cp -r content-scripts icons popup.html popup.js options.html options.js background.js /tmp/chrome-build/
            cp manifest-chrome.json /tmp/chrome-build/manifest.json
            cd /tmp/chrome-build && zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" .
            cd "$GITHUB_WORKSPACE"
            echo "✅ Built: $(du -h "$ZIP_NAME" | cut -f1)"
          fi

      - name: Submit to Chrome Web Store
        if: steps.check_secrets.outputs.configured == 'true'
        env:
          CWS_EXTENSION_ID:    ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID:       ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET:   ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN:   ${{ secrets.CWS_REFRESH_TOKEN }}
          DRY_RUN:             ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '1' || '0' }}
          VERSION:             ${{ steps.version.outputs.version }}
        run: |
          ZIP_NAME="skipstream-${VERSION}-chrome.zip"
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.parse, sys

          ext_id        = os.environ["CWS_EXTENSION_ID"]
          client_id     = os.environ["CWS_CLIENT_ID"]
          client_secret = os.environ["CWS_CLIENT_SECRET"]
          refresh_token = os.environ["CWS_REFRESH_TOKEN"]
          dry_run       = os.environ.get("DRY_RUN") == "1"
          version       = os.environ["VERSION"]
          zip_name      = f"skipstream-{version}-chrome.zip"

          if dry_run:
              print(f"[dry-run] Would upload {zip_name} for extension {ext_id}")
              sys.exit(0)

          if not os.path.exists(zip_name):
              print(f"❌ ZIP not found: {zip_name}")
              sys.exit(1)

          # Step 1: Exchange refresh token for access token
          token_data = urllib.parse.urlencode({
              "client_id":     client_id,
              "client_secret": client_secret,
              "refresh_token": refresh_token,
              "grant_type":    "refresh_token",
          }).encode()
          req = urllib.request.Request(
              "https://oauth2.googleapis.com/token",
              data=token_data,
              headers={"Content-Type": "application/x-www-form-urlencoded"},
              method="POST"
          )
          with urllib.request.urlopen(req) as r:
              token = json.load(r)
          if "error" in token:
              print(f"❌ OAuth error: {token}")
              sys.exit(1)
          access_token = token["access_token"]
          print("✅ OAuth token obtained")

          # Step 2: Upload ZIP to CWS
          with open(zip_name, "rb") as f:
              zip_bytes = f.read()

          upload_req = urllib.request.Request(
              f"https://www.googleapis.com/upload/chromewebstore/v1.1/items/{ext_id}",
              data=zip_bytes,
              headers={
                  "Authorization": f"Bearer {access_token}",
                  "x-goog-api-version": "2",
                  "Content-Type": "application/zip",
              },
              method="PUT"
          )
          with urllib.request.urlopen(upload_req) as r:
              upload_result = json.load(r)

          if upload_result.get("uploadState") != "SUCCESS":
              print("❌ Upload failed:", json.dumps(upload_result, indent=2))
              sys.exit(1)
          print(f"✅ ZIP uploaded: {zip_name}")

          # Step 3: Publish
          pub_req = urllib.request.Request(
              f"https://www.googleapis.com/chromewebstore/v1.1/items/{ext_id}/publish",
              data=b"{}",
              headers={
                  "Authorization": f"Bearer {access_token}",
                  "x-goog-api-version": "2",
                  "Content-Type": "application/json",
              },
              method="POST"
          )
          with urllib.request.urlopen(pub_req) as r:
              pub_result = json.load(r)

          status = pub_result.get("status", [])
          ok_statuses = {"OK", "PUBLISHED_WITH_FRICTION", "ITEM_PENDING_REVIEW"}
          if "OK" in status or "PUBLISHED_WITH_FRICTION" in status or "ITEM_PENDING_REVIEW" in status:
              print(f"✅ Published to Chrome Web Store: v{version}")
              print("   Status:", status)
          else:
              print("❌ Publish returned unexpected status:", json.dumps(pub_result, indent=2))
              if not all(s in ok_statuses for s in status):
                  sys.exit(1)
          PYEOF

      - name: Skip summary (no secrets)
        if: steps.check_secrets.outputs.configured == 'false'
        run: |
          echo "## ⏭ Chrome Web Store Submission Skipped" >> $GITHUB_STEP_SUMMARY
          echo "CWS secrets not configured. Set the following secrets to enable automatic CWS publishing:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`CWS_EXTENSION_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`CWS_CLIENT_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`CWS_CLIENT_SECRET\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`CWS_REFRESH_TOKEN\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See: https://developer.chrome.com/docs/webstore/using-api/" >> $GITHUB_STEP_SUMMARY

      - name: Summary on success
        if: success() && steps.check_secrets.outputs.configured == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          echo "## ✅ Chrome Web Store Submission Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Listing:** https://chromewebstore.google.com/detail/skipstream/${CWS_EXTENSION_ID}" >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure() && steps.check_secrets.outputs.configured == 'true'
        run: |
          echo "## ❌ Chrome Web Store Submission Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the step logs above for the error." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Required secrets:** \`CWS_EXTENSION_ID\`, \`CWS_CLIENT_ID\`, \`CWS_CLIENT_SECRET\`, \`CWS_REFRESH_TOKEN\`" >> $GITHUB_STEP_SUMMARY
