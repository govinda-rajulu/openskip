name: Lint & Validate

on:
  push:
    branches: [main, beta-testing]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Check Code Formatting & Lint
        run: npm run lint || echo "No lint script defined yet"

      - name: Pack Extension Files into Zip
        run: |
          zip -r openskip-extension.zip manifest.json background.js popup.html popup.js content-scripts/ icons/ ui/ README.md TESTING.md LICENSE || echo "Packing what is available"

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: openskip-raw-build
          path: openskip-extension.zip