name: Auto Label Issues

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const body = (context.payload.issue.body || '').toLowerCase();
            const title = (context.payload.issue.title || '').toLowerCase();
            const text = title + ' ' + body;
            const labels = [];

            if (text.includes('bug') || text.includes('broken') || text.includes('error') || text.includes('fail')) {
              labels.push('bug');
            }
            if (text.includes('feature') || text.includes('add') || text.includes('enhance') || text.includes('improve')) {
              labels.push('enhancement');
            }
            if (text.includes('site') || text.includes('netflix') || text.includes('hulu') || text.includes('streaming')) {
              labels.push('site-specific');
            }
            if (text.includes('skip') || text.includes('intro') || text.includes('recap') || text.includes('outro')) {
              labels.push('skip-detection');
            }
            if (text.includes('sync') || text.includes('supabase') || text.includes('resume') || text.includes('playback')) {
              labels.push('sync');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels
              });
            }
