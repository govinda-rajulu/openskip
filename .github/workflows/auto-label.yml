name: Auto Label Issues

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const body  = (context.payload.issue.body  || '').toLowerCase();
            const title = (context.payload.issue.title || '').toLowerCase();
            const text  = title + ' ' + body;
            const labels = [];

            if (text.includes('bug') || text.includes('broken') || text.includes('error') || text.includes('fail') || text.includes('not working')) {
              labels.push('bug');
            }
            if (text.includes('feature') || text.includes('enhance') || text.includes('improve') || text.includes('add support') || text.includes('request')) {
              labels.push('enhancement');
            }
            if (text.includes('site') || text.includes('netflix') || text.includes('hulu') || text.includes('streaming') || text.includes('crunchyroll') || text.includes('disney') || text.includes('prime video') || text.includes('max ')) {
              labels.push('site-specific');
            }
            if (text.includes('skip') || text.includes('intro') || text.includes('recap') || text.includes('outro') || text.includes('segment')) {
              labels.push('skip-detection');
            }
            if (text.includes('sync') || text.includes('supabase') || text.includes('resume') || text.includes('playback') || text.includes('cloud') || text.includes('history')) {
              labels.push('sync');
            }
            if (text.includes('chrome') || text.includes('manifest v3') || text.includes('mv3')) {
              labels.push('chrome');
            }
            if (text.includes('firefox') || text.includes('android') || text.includes('fennec')) {
              labels.push('firefox');
            }
            if (text.includes('performance') || text.includes('memory') || text.includes('cpu') || text.includes('slow')) {
              labels.push('performance');
            }

            if (labels.length > 0) {
              // Ensure labels exist before applying
              for (const label of labels) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: 'ededed'
                  });
                } catch(e) { /* already exists */ }
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels
              });
            }
